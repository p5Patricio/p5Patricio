    <path d="M0 60Q80 53 165 46Q248 40 348 36Q450 33 552 36Q652 40 728 46Q808 52 866 56Q890 58 900 59"
          stroke="#5a3d2b" stroke-width="1.4" fill="none" stroke-linecap="round" opacity=".28"/>

    <!-- Sub-branch 1: up-left from x≈145 -->
    <path d="M148 47Q140 34 126 20Q119 11 110 5" stroke="#3d2b1f" stroke-width="2.1" fill="none" stroke-linecap="round" opacity=".56"/>
    <path d="M126 20Q113 27 98 28" stroke="#3d2b1f" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".50"/>
    <path d="M126 20Q130 8 124 3" stroke="#3d2b1f" stroke-width="1.3" fill="none" stroke-linecap="round" opacity=".44"/>

    <!-- Sub-branch 2: down from x≈290 -->
    <path d="M292 38Q284 53 272 66Q265 74 256 83" stroke="#3d2b1f" stroke-width="1.9" fill="none" stroke-linecap="round" opacity=".52"/>
    <path d="M272 66Q282 72 290 78" stroke="#3d2b1f" stroke-width="1.3" fill="none" stroke-linecap="round" opacity=".46"/>

    <!-- Sub-branch 3: up from x≈452 -->
    <path d="M454 34Q449 20 438 10Q431 4 424 3" stroke="#3d2b1f" stroke-width="1.9" fill="none" stroke-linecap="round" opacity=".52"/>
    <path d="M438 10Q448 6 458 4" stroke="#3d2b1f" stroke-width="1.3" fill="none" stroke-linecap="round" opacity=".46"/>

    <!-- Sub-branch 4: down from x≈620 -->
    <path d="M622 41Q629 55 637 68Q642 76 647 85" stroke="#3d2b1f" stroke-width="1.9" fill="none" stroke-linecap="round" opacity=".50"/>
    <path d="M637 68Q626 74 620 81" stroke="#3d2b1f" stroke-width="1.3" fill="none" stroke-linecap="round" opacity=".44"/>

    <!-- Sub-branch 5: up from x≈782 -->
    <path d="M784 48Q778 35 768 23Q762 15 754 8" stroke="#3d2b1f" stroke-width="1.6" fill="none" stroke-linecap="round" opacity=".48"/>
    <path d="M768 23Q778 18 786 16" stroke="#3d2b1f" stroke-width="1.1" fill="none" stroke-linecap="round" opacity=".42"/>

    <!-- New mini sub-branch at x≈360: up -->
    <path d="M360 36Q358 29 356 22" stroke="#3d2b1f" stroke-width="1.2" fill="none" stroke-linecap="round" opacity=".48"/>

    <!-- New mini sub-branch at x≈650: down -->
    <path d="M650 40Q652 48 654 58" stroke="#3d2b1f" stroke-width="1.2" fill="none" stroke-linecap="round" opacity=".46"/>

    <!-- Sakura flowers: sub-branch 1 (upper-left) - ENHANCED -->
    <use href="#dskM" transform="translate(110,5)" fill="#ffc0d0" opacity=".60" class="bl"/>
    <use href="#dskS" transform="translate(98,28)" fill="#ffa0b4" opacity=".56"/>
