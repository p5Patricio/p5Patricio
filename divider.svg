<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 88" width="900" height="88">
  <defs>
    <!-- Small sakura flower (~14px span) -->
    <symbol id="dskS" overflow="visible">
      <path d="M0,0 C2.3,-2 3.9,-5.7 2.2,-9 Q1,-10.7 0,-10.2 Q-1,-10.7 -2.2,-9 C-3.9,-5.7 -2.3,-2 0,0Z" transform="rotate(0)"/>
      <path d="M0,0 C2.3,-2 3.9,-5.7 2.2,-9 Q1,-10.7 0,-10.2 Q-1,-10.7 -2.2,-9 C-3.9,-5.7 -2.3,-2 0,0Z" transform="rotate(72)"/>
      <path d="M0,0 C2.3,-2 3.9,-5.7 2.2,-9 Q1,-10.7 0,-10.2 Q-1,-10.7 -2.2,-9 C-3.9,-5.7 -2.3,-2 0,0Z" transform="rotate(144)"/>
      <path d="M0,0 C2.3,-2 3.9,-5.7 2.2,-9 Q1,-10.7 0,-10.2 Q-1,-10.7 -2.2,-9 C-3.9,-5.7 -2.3,-2 0,0Z" transform="rotate(216)"/>
      <path d="M0,0 C2.3,-2 3.9,-5.7 2.2,-9 Q1,-10.7 0,-10.2 Q-1,-10.7 -2.2,-9 C-3.9,-5.7 -2.3,-2 0,0Z" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="1.5" fill="#fff8f5"/>
    </symbol>
    <!-- Medium sakura flower (~20px span) -->
    <symbol id="dskM" overflow="visible">
      <path d="M0,0 C3.5,-3 5.8,-8.5 3.3,-13.5 Q1.5,-16 0,-15.3 Q-1.5,-16 -3.3,-13.5 C-5.8,-8.5 -3.5,-3 0,0Z" transform="rotate(0)"/>
      <path d="M0,0 C3.5,-3 5.8,-8.5 3.3,-13.5 Q1.5,-16 0,-15.3 Q-1.5,-16 -3.3,-13.5 C-5.8,-8.5 -3.5,-3 0,0Z" transform="rotate(72)"/>
      <path d="M0,0 C3.5,-3 5.8,-8.5 3.3,-13.5 Q1.5,-16 0,-15.3 Q-1.5,-16 -3.3,-13.5 C-5.8,-8.5 -3.5,-3 0,0Z" transform="rotate(144)"/>
      <path d="M0,0 C3.5,-3 5.8,-8.5 3.3,-13.5 Q1.5,-16 0,-15.3 Q-1.5,-16 -3.3,-13.5 C-5.8,-8.5 -3.5,-3 0,0Z" transform="rotate(216)"/>
      <path d="M0,0 C3.5,-3 5.8,-8.5 3.3,-13.5 Q1.5,-16 0,-15.3 Q-1.5,-16 -3.3,-13.5 C-5.8,-8.5 -3.5,-3 0,0Z" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="2" fill="#fff8f5"/>
    </symbol>
    <!-- Large sakura flower (~28px span) -->
    <symbol id="dskL" overflow="visible">
      <path d="M0,0 C4.5,-3.8 7.5,-11 4.3,-17.5 Q2,-21 0,-20 Q-2,-21 -4.3,-17.5 C-7.5,-11 -4.5,-3.8 0,0Z" transform="rotate(0)"/>
      <path d="M0,0 C4.5,-3.8 7.5,-11 4.3,-17.5 Q2,-21 0,-20 Q-2,-21 -4.3,-17.5 C-7.5,-11 -4.5,-3.8 0,0Z" transform="rotate(72)"/>
      <path d="M0,0 C4.5,-3.8 7.5,-11 4.3,-17.5 Q2,-21 0,-20 Q-2,-21 -4.3,-17.5 C-7.5,-11 -4.5,-3.8 0,0Z" transform="rotate(144)"/>
      <path d="M0,0 C4.5,-3.8 7.5,-11 4.3,-17.5 Q2,-21 0,-20 Q-2,-21 -4.3,-17.5 C-7.5,-11 -4.5,-3.8 0,0Z" transform="rotate(216)"/>
      <path d="M0,0 C4.5,-3.8 7.5,-11 4.3,-17.5 Q2,-21 0,-20 Q-2,-21 -4.3,-17.5 C-7.5,-11 -4.5,-3.8 0,0Z" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="2.4" fill="#fff8f5"/>
    </symbol>
    <style>
      @keyframes brSway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(.7deg)}}
      @keyframes pd1{0%{transform:translate(0,0) rotate(0deg);opacity:.44}100%{transform:translate(16px,28px) rotate(95deg);opacity:.07}}
      @keyframes pd2{0%{transform:translate(0,0) rotate(0deg);opacity:.38}100%{transform:translate(-11px,22px) rotate(-80deg);opacity:.06}}
      @keyframes pd3{0%{transform:translate(0,0) rotate(12deg);opacity:.34}100%{transform:translate(9px,25px) rotate(115deg);opacity:.05}}
      @keyframes bloom{0%,100%{opacity:.44}50%{opacity:.72}}
      .br{animation:brSway 11s ease-in-out infinite;transform-origin:0 44px}
      .d1{animation:pd1 14s ease-in-out infinite}
      .d2{animation:pd2 16s ease-in-out infinite 2.2s}
      .d3{animation:pd3 18s ease-in-out infinite 4.4s}
      .d1b{animation:pd1 15s ease-in-out infinite 6.6s}
      .d2b{animation:pd2 12s ease-in-out infinite 3.1s}
      .d3b{animation:pd3 19s ease-in-out infinite 1.5s}
      .d4{animation:pd1 13s ease-in-out infinite 8.8s}
      .d5{animation:pd2 17s ease-in-out infinite 5.5s}
      .d6{animation:pd3 15s ease-in-out infinite 7.7s}
      .d4b{animation:pd1 16s ease-in-out infinite 2.5s}
      .bl{animation:bloom 5.2s ease-in-out infinite}
      @media(prefers-reduced-motion:reduce){*{animation-duration:.01s!important;animation-iteration-count:1!important}}
    </style>
  </defs>

  <g class="br">
    <!-- Main branch -->
    <path d="M0 60Q80 53 165 46Q248 40 348 36Q450 33 552 36Q652 40 728 46Q808 52 866 56Q890 58 900 59"
