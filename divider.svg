    <ellipse cx="332" cy="20" rx="2.2" ry="1.3" fill="#ffa0b4" opacity=".36" class="d2"/>
    <ellipse cx="474" cy="16" rx="2.6" ry="1.5" fill="#ffc0d0" opacity=".40" class="d3"/>
