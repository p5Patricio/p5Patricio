<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 88" width="900" height="88">
  <defs>
    <style>
      @keyframes brSway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(.7deg)}}
      @keyframes pd1{0%{transform:translate(0,0) rotate(0deg);opacity:.44}100%{transform:translate(16px,28px) rotate(95deg);opacity:.07}}
      @keyframes pd2{0%{transform:translate(0,0) rotate(0deg);opacity:.38}100%{transform:translate(-11px,22px) rotate(-80deg);opacity:.06}}
      @keyframes pd3{0%{transform:translate(0,0) rotate(12deg);opacity:.34}100%{transform:translate(9px,25px) rotate(115deg);opacity:.05}}
      @keyframes bloom{0%,100%{opacity:.36}50%{opacity:.62}}
      .br{animation:brSway 11s ease-in-out infinite;transform-origin:0 44px}
      .d1{animation:pd1 14s ease-in-out infinite}
      .d2{animation:pd2 16s ease-in-out infinite 2.2s}
      .d3{animation:pd3 18s ease-in-out infinite 4.4s}
      .d1b{animation:pd1 15s ease-in-out infinite 6.6s}
      .d2b{animation:pd2 12s ease-in-out infinite 3.1s}
      .d3b{animation:pd3 19s ease-in-out infinite 1.5s}
      .bl{animation:bloom 5.2s ease-in-out infinite}
      @media(prefers-reduced-motion:reduce){*{animation-duration:.01s!important;animation-iteration-count:1!important}}
    </style>
  </defs>

  <g class="br">
    <!-- Main branch -->
    <path d="M0 60Q80 53 165 46Q248 40 348 36Q450 33 552 36Q652 40 728 46Q808 52 866 56Q890 58 900 59"
          stroke="#3d2b1f" stroke-width="3.2" fill="none" stroke-linecap="round" opacity=".66"/>
    <path d="M0 60Q80 53 165 46Q248 40 348 36Q450 33 552 36Q652 40 728 46Q808 52 866 56Q890 58 900 59"
          stroke="#5a3d2b" stroke-width="1.4" fill="none" stroke-linecap="round" opacity=".28"/>

    <!-- Sub-branch 1: up-left from x≈145 -->
    <path d="M148 47Q140 34 126 20Q119 11 110 5" stroke="#3d2b1f" stroke-width="2.1" fill="none" stroke-linecap="round" opacity=".56"/>
    <path d="M126 20Q113 27 98 28" stroke="#3d2b1f" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".50"/>
    <path d="M126 20Q130 8 124 3" stroke="#3d2b1f" stroke-width="1.3" fill="none" stroke-linecap="round" opacity=".44"/>

    <!-- Sub-branch 2: down from x≈290 -->
    <path d="M292 38Q284 53 272 66Q265 74 256 83" stroke="#3d2b1f" stroke-width="1.9" fill="none" stroke-linecap="round" opacity=".52"/>
    <path d="M272 66Q282 72 290 78" stroke="#3d2b1f" stroke-width="1.3" fill="none" stroke-linecap="round" opacity=".46"/>

    <!-- Sub-branch 3: up from x≈452 -->
    <path d="M454 34Q449 20 438 10Q431 4 424 3" stroke="#3d2b1f" stroke-width="1.9" fill="none" stroke-linecap="round" opacity=".52"/>
    <path d="M438 10Q448 6 458 4" stroke="#3d2b1f" stroke-width="1.3" fill="none" stroke-linecap="round" opacity=".46"/>

    <!-- Sub-branch 4: down from x≈620 -->
    <path d="M622 41Q629 55 637 68Q642 76 647 85" stroke="#3d2b1f" stroke-width="1.9" fill="none" stroke-linecap="round" opacity=".50"/>
    <path d="M637 68Q626 74 620 81" stroke="#3d2b1f" stroke-width="1.3" fill="none" stroke-linecap="round" opacity=".44"/>

    <!-- Sub-branch 5: up from x≈782 -->
    <path d="M784 48Q778 35 768 23Q762 15 754 8" stroke="#3d2b1f" stroke-width="1.6" fill="none" stroke-linecap="round" opacity=".48"/>
    <path d="M768 23Q778 18 786 16" stroke="#3d2b1f" stroke-width="1.1" fill="none" stroke-linecap="round" opacity=".42"/>

    <!-- Blossoms: sub-branch 1 -->
    <circle cx="110" cy="5" r="5.5" fill="#ffb6c8" opacity=".56" class="bl"/>
    <circle cx="98" cy="28" r="4.5" fill="#ffa0b4" opacity=".52"/>
    <circle cx="122" cy="14" r="6.5" fill="#ffc0d0" opacity=".52"/>
    <circle cx="102" cy="14" r="4" fill="#ffb6c8" opacity=".46"/>
    <circle cx="124" cy="4" r="3.5" fill="#ffa0b4" opacity=".44"/>

    <!-- Blossoms: sub-branch 2 -->
    <circle cx="256" cy="83" r="5.5" fill="#ffb6c8" opacity=".52" class="bl"/>
    <circle cx="290" cy="78" r="4.5" fill="#ffa0b4" opacity=".46"/>
    <circle cx="246" cy="79" r="4" fill="#ffc0d0" opacity=".46"/>
    <circle cx="265" cy="74" r="4" fill="#ffb6c8" opacity=".42"/>

    <!-- Blossoms: sub-branch 3 -->
    <circle cx="424" cy="4" r="5.5" fill="#ffb6c8" opacity=".52" class="bl"/>
    <circle cx="458" cy="5" r="4.5" fill="#ffa0b4" opacity=".52"/>
    <circle cx="413" cy="7" r="4" fill="#ffc0d0" opacity=".46"/>
    <circle cx="440" cy="4" r="3.5" fill="#ffb6c8" opacity=".44"/>

    <!-- Blossoms: sub-branch 4 -->
    <circle cx="647" cy="85" r="5.5" fill="#ffb6c8" opacity=".52" class="bl"/>
    <circle cx="620" cy="81" r="4.5" fill="#ffa0b4" opacity=".46"/>
    <circle cx="638" cy="80" r="4" fill="#ffc0d0" opacity=".44"/>

    <!-- Blossoms: sub-branch 5 -->
    <circle cx="754" cy="8" r="5" fill="#ffb6c8" opacity=".50"/>
    <circle cx="768" cy="20" r="4" fill="#ffa0b4" opacity=".46"/>
    <circle cx="786" cy="16" r="4" fill="#ffc0d0" opacity=".42"/>
    <circle cx="746" cy="16" r="3.5" fill="#ffb6c8" opacity=".40"/>

    <!-- Scattered blossoms along main branch -->
    <circle cx="84" cy="52" r="4.2" fill="#ffb6c8" opacity=".40"/>
    <circle cx="200" cy="44" r="3.8" fill="#ffa0b4" opacity=".38"/>
    <circle cx="345" cy="36" r="4.2" fill="#ffc0d0" opacity=".36"/>
    <circle cx="498" cy="34" r="3.8" fill="#ffb6c8" opacity=".34"/>
    <circle cx="600" cy="40" r="4.0" fill="#ffa0b4" opacity=".36"/>
    <circle cx="702" cy="46" r="3.8" fill="#ffb6c8" opacity=".34"/>
    <circle cx="824" cy="54" r="3.5" fill="#ffa0b4" opacity=".30"/>
    <circle cx="892" cy="59" r="3.2" fill="#ffc0d0" opacity=".26"/>

    <!-- Floating petals near branch -->
    <ellipse cx="172" cy="28" rx="2.6" ry="1.5" fill="#ffb6c8" opacity=".42" class="d1"/>
    <ellipse cx="332" cy="20" rx="2.2" ry="1.3" fill="#ffa0b4" opacity=".36" class="d2"/>
    <ellipse cx="474" cy="16" rx="2.6" ry="1.5" fill="#ffc0d0" opacity=".40" class="d3"/>
    <ellipse cx="610" cy="30" rx="2.2" ry="1.3" fill="#ffb6c8" opacity=".34" class="d1b"/>
    <ellipse cx="750" cy="22" rx="2.4" ry="1.4" fill="#ffa0b4" opacity=".32" class="d2b"/>
    <ellipse cx="860" cy="42" rx="2.2" ry="1.3" fill="#ffc0d0" opacity=".28" class="d3b"/>
  </g>
</svg>
