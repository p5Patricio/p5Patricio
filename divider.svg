    <!-- Extra petal animations -->
    <ellipse cx="420" cy="45" rx="2.4" ry="1.4" fill="#ffb6c8" opacity=".36" class="d4"/>
    <ellipse cx="520" cy="28" rx="2.2" ry="1.3" fill="#ffa0b4" opacity=".38" class="d5"/>
