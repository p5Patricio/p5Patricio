    <use href="#dskS" transform="translate(358,22)" fill="#ffb6c8" opacity=".56"/>
    <use href="#dskS" transform="translate(362,26) rotate(12)" fill="#ffa0b4" opacity=".50"/>

    <!-- Branch at x≈650 (down) -->
