<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 50" width="900" height="50">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fecdd3" stop-opacity="0"/>
      <stop offset="20%" stop-color="#fecdd3" stop-opacity=".3"/>
      <stop offset="50%" stop-color="#fecdd3" stop-opacity=".5"/>
      <stop offset="80%" stop-color="#fecdd3" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#fecdd3" stop-opacity="0"/>
    </linearGradient>
    <style>
      @keyframes drift{0%{transform:translateX(0) translateY(0) rotate(0deg)}50%{transform:translateX(8px) translateY(-3px) rotate(15deg)}100%{transform:translateX(0) translateY(0) rotate(0deg)}}
      @keyframes drift2{0%{transform:translateX(0) translateY(0) rotate(0deg)}50%{transform:translateX(-6px) translateY(2px) rotate(-12deg)}100%{transform:translateX(0) translateY(0) rotate(0deg)}}
      @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.7}}
      .d1{animation:drift 6s ease-in-out infinite}
      .d2{animation:drift2 8s ease-in-out infinite 1s}
      .d3{animation:drift 7s ease-in-out infinite 2s}
      .d4{animation:drift2 9s ease-in-out infinite .5s}
      .fl{animation:pulse 4s ease-in-out infinite}
      @media(prefers-reduced-motion:reduce){*{animation-duration:.01s!important;animation-iteration-count:1!important}}
    </style>
  </defs>
  <line x1="50" y1="25" x2="850" y2="25" stroke="url(#lg)" stroke-width=".5"/>
  <g transform="translate(450,25)" class="fl">
    <ellipse cx="0" cy="-5.5" rx="2.5" ry="4" fill="#ffb6c8" transform="rotate(0)"/>
    <ellipse cx="0" cy="-5.5" rx="2.5" ry="4" fill="#ffb6c8" transform="rotate(72)"/>
    <ellipse cx="0" cy="-5.5" rx="2.5" ry="4" fill="#ffb6c8" transform="rotate(144)"/>
    <ellipse cx="0" cy="-5.5" rx="2.5" ry="4" fill="#ffb6c8" transform="rotate(216)"/>
    <ellipse cx="0" cy="-5.5" rx="2.5" ry="4" fill="#ffb6c8" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="1.5" fill="#ffd5de"/>
  </g>
  <ellipse cx="180" cy="18" rx="2.5" ry="1.3" fill="#ffb6c8" opacity=".35" class="d1"/>
  <ellipse cx="310" cy="32" rx="2" ry="1.1" fill="#ffa0b4" opacity=".3" class="d2"/>
  <ellipse cx="580" cy="16" rx="2.2" ry="1.2" fill="#ffc0d0" opacity=".35" class="d3"/>
  <ellipse cx="720" cy="30" rx="1.8" ry="1" fill="#ffb6c8" opacity=".3" class="d4"/>
  <ellipse cx="130" cy="28" rx="1.5" ry=".9" fill="#ffa0b4" opacity=".25" class="d3"/>
  <ellipse cx="790" cy="20" rx="2" ry="1.1" fill="#ffc0d0" opacity=".25" class="d1"/>
</svg>
