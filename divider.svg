    <use href="#dskM" transform="translate(105,20) rotate(-8)" fill="#ffc0d0" opacity=".52"/>
    <use href="#dskS" transform="translate(130,12) rotate(18)" fill="#ffa0b4" opacity=".46"/>
    <use href="#dskL" transform="translate(120,8) rotate(5)" fill="#ffb6c8" opacity=".54"/>

