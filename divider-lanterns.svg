<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 88" width="900" height="88" aria-hidden="true">
  <defs>
    <!-- Paper chōchin lantern -->
    <symbol id="lnt" overflow="visible">
      <!-- top cap -->
      <rect x="-7" y="-24" width="14" height="2.2" fill="#3d2b1f" opacity=".85"/>
      <!-- body -->
      <ellipse cx="0" cy="-12" rx="9" ry="11" fill="#ffb6c8" opacity=".9"/>
      <ellipse cx="0" cy="-12" rx="9" ry="11" fill="none" stroke="#3d2b1f" stroke-width=".6" opacity=".6"/>
      <!-- horizontal ribs -->
      <path d="M-8.6 -16 Q0 -15.4 8.6 -16" stroke="#3d2b1f" stroke-width=".5" fill="none" opacity=".55"/>
      <path d="M-9 -12 Q0 -11.4 9 -12" stroke="#3d2b1f" stroke-width=".5" fill="none" opacity=".55"/>
      <path d="M-8.6 -8 Q0 -7.4 8.6 -8" stroke="#3d2b1f" stroke-width=".5" fill="none" opacity=".55"/>
      <!-- bottom cap -->
      <rect x="-6" y="-2.4" width="12" height="2" fill="#3d2b1f" opacity=".85"/>
      <!-- tassel -->
      <line x1="0" y1=".4" x2="0" y2="6" stroke="#3d2b1f" stroke-width=".8" opacity=".75"/>
      <circle cx="0" cy="7.2" r="1.6" fill="#ffa0b4" opacity=".85"/>
      <!-- inner glow -->
      <ellipse cx="0" cy="-12" rx="5" ry="7" fill="#fff8f5" opacity=".35"/>
    </symbol>
    <style>
      @keyframes sway1{0%,100%{transform:rotate(-2.5deg)}50%{transform:rotate(2deg)}}
      @keyframes sway2{0%,100%{transform:rotate(1.8deg)}50%{transform:rotate(-2.2deg)}}
      @keyframes glow{0%,100%{opacity:.78}50%{opacity:1}}
      @keyframes star{0%,100%{opacity:.3}50%{opacity:.8}}
      .l1{animation:sway1 5.2s ease-in-out infinite;transform-origin:0 -22px}
      .l2{animation:sway2 6.1s ease-in-out infinite;transform-origin:0 -22px}
      .l3{animation:sway1 5.7s ease-in-out infinite .8s;transform-origin:0 -22px}
      .l4{animation:sway2 5.4s ease-in-out infinite 1.3s;transform-origin:0 -22px}
      .l5{animation:sway1 6.3s ease-in-out infinite 2.2s;transform-origin:0 -22px}
      .g{animation:glow 4s ease-in-out infinite}
      .s{animation:star 3.2s ease-in-out infinite}
      @media(prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>

  <!-- Hanging wire (catenary approximation) -->
  <path d="M0 18 Q225 30 450 26 T900 22"
        stroke="#5a3d2b" stroke-width=".9" fill="none" opacity=".5"/>

  <!-- Stars -->
  <g fill="#fecdd3">
    <circle cx="54" cy="8" r=".8" class="s"/>
    <circle cx="210" cy="6" r="1" class="s"/>
    <circle cx="340" cy="10" r=".7" class="s"/>
    <circle cx="520" cy="5" r=".9" class="s"/>
    <circle cx="700" cy="9" r=".8" class="s"/>
    <circle cx="830" cy="6" r="1" class="s"/>
  </g>

  <!-- Lanterns hanging along the wire -->
  <!-- Each lantern positioned at x, y = wire position -->
  <g transform="translate(110,20)" class="l1"><use href="#lnt" class="g"/></g>
  <g transform="translate(238,25)" class="l2"><use href="#lnt" class="g"/></g>
  <g transform="translate(372,28)" class="l3"><use href="#lnt" class="g"/></g>
  <g transform="translate(506,27)" class="l4"><use href="#lnt" class="g"/></g>
  <g transform="translate(640,25)" class="l5"><use href="#lnt" class="g"/></g>
  <g transform="translate(774,22)" class="l1"><use href="#lnt" class="g"/></g>

  <!-- Warm glow halos -->
  <g opacity=".18">
    <circle cx="110" cy="8" r="22" fill="#ffa0b4"/>
    <circle cx="238" cy="13" r="22" fill="#ffb6c8"/>
    <circle cx="372" cy="16" r="22" fill="#ffa0b4"/>
    <circle cx="506" cy="15" r="22" fill="#ffb6c8"/>
    <circle cx="640" cy="13" r="22" fill="#ffa0b4"/>
    <circle cx="774" cy="10" r="22" fill="#ffb6c8"/>
  </g>

  <!-- Faint ground petals -->
  <g fill="#ffb6c8" opacity=".35">
    <ellipse cx="60" cy="78" rx="2.4" ry="1.3" transform="rotate(18 60 78)"/>
    <ellipse cx="300" cy="82" rx="2.2" ry="1.2" transform="rotate(-14 300 82)"/>
    <ellipse cx="580" cy="80" rx="2.4" ry="1.3" transform="rotate(26 580 80)"/>
    <ellipse cx="850" cy="82" rx="2.2" ry="1.2" transform="rotate(-20 850 82)"/>
  </g>
</svg>
