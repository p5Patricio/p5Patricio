<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 88" width="900" height="88" aria-hidden="true">
  <defs>
    <symbol id="torii" overflow="visible">
      <path d="M-30 0 Q-32 -3 -28 -4 L28 -4 Q32 -3 30 0 Z" fill="currentColor"/>
      <rect x="-27" y="2" width="54" height="2.6" fill="currentColor"/>
      <rect x="-22" y="16" width="44" height="2.2" fill="currentColor"/>
      <rect x="-3" y="6" width="6" height="8" fill="currentColor" opacity=".85"/>
      <rect x="-22" y="4" width="3" height="40" fill="currentColor"/>
      <rect x="19" y="4" width="3" height="40" fill="currentColor"/>
    </symbol>
    <symbol id="skS" overflow="visible">
      <path d="M0,0 C1.8,-1.5 3,-4.4 1.7,-7 Q.8,-8.3 0,-7.9 Q-.8,-8.3 -1.7,-7 C-3,-4.4 -1.8,-1.5 0,0Z" transform="rotate(0)"/>
      <path d="M0,0 C1.8,-1.5 3,-4.4 1.7,-7 Q.8,-8.3 0,-7.9 Q-.8,-8.3 -1.7,-7 C-3,-4.4 -1.8,-1.5 0,0Z" transform="rotate(72)"/>
      <path d="M0,0 C1.8,-1.5 3,-4.4 1.7,-7 Q.8,-8.3 0,-7.9 Q-.8,-8.3 -1.7,-7 C-3,-4.4 -1.8,-1.5 0,0Z" transform="rotate(144)"/>
      <path d="M0,0 C1.8,-1.5 3,-4.4 1.7,-7 Q.8,-8.3 0,-7.9 Q-.8,-8.3 -1.7,-7 C-3,-4.4 -1.8,-1.5 0,0Z" transform="rotate(216)"/>
      <path d="M0,0 C1.8,-1.5 3,-4.4 1.7,-7 Q.8,-8.3 0,-7.9 Q-.8,-8.3 -1.7,-7 C-3,-4.4 -1.8,-1.5 0,0Z" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="1" fill="#fff8f5"/>
    </symbol>
    <symbol id="skM" overflow="visible">
      <path d="M0,0 C2.8,-2.3 4.6,-6.8 2.6,-10.8 Q1.2,-12.8 0,-12.2 Q-1.2,-12.8 -2.6,-10.8 C-4.6,-6.8 -2.8,-2.3 0,0Z" transform="rotate(0)"/>
      <path d="M0,0 C2.8,-2.3 4.6,-6.8 2.6,-10.8 Q1.2,-12.8 0,-12.2 Q-1.2,-12.8 -2.6,-10.8 C-4.6,-6.8 -2.8,-2.3 0,0Z" transform="rotate(72)"/>
      <path d="M0,0 C2.8,-2.3 4.6,-6.8 2.6,-10.8 Q1.2,-12.8 0,-12.2 Q-1.2,-12.8 -2.6,-10.8 C-4.6,-6.8 -2.8,-2.3 0,0Z" transform="rotate(144)"/>
      <path d="M0,0 C2.8,-2.3 4.6,-6.8 2.6,-10.8 Q1.2,-12.8 0,-12.2 Q-1.2,-12.8 -2.6,-10.8 C-4.6,-6.8 -2.8,-2.3 0,0Z" transform="rotate(216)"/>
      <path d="M0,0 C2.8,-2.3 4.6,-6.8 2.6,-10.8 Q1.2,-12.8 0,-12.2 Q-1.2,-12.8 -2.6,-10.8 C-4.6,-6.8 -2.8,-2.3 0,0Z" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="1.4" fill="#fff8f5"/>
    </symbol>
    <radialGradient id="mistGT" cx="50%" cy="100%" r="60%">
      <stop offset="0" stop-color="#1a1a2e" stop-opacity=".85"/>
      <stop offset="1" stop-color="#0f0f1a" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes driftM{0%{transform:translateX(0)}50%{transform:translateX(14px)}100%{transform:translateX(0)}}
      @keyframes flick{0%,100%{opacity:.72}50%{opacity:1}}
      @keyframes pfall{0%{transform:translate(0,0) rotate(0);opacity:.6}100%{transform:translate(-22px,34px) rotate(-130deg);opacity:0}}
      @keyframes bloom{0%,100%{opacity:.5}50%{opacity:.85}}
      @keyframes tw{0%,100%{opacity:.2}50%{opacity:.8}}
      .m{animation:driftM 14s ease-in-out infinite}
      .m2{animation:driftM 18s ease-in-out infinite reverse}
      .f1{animation:flick 3.4s ease-in-out infinite}
      .f2{animation:flick 4.2s ease-in-out infinite .6s}
      .p1{animation:pfall 12s ease-in-out infinite}
      .p2{animation:pfall 15s ease-in-out infinite 2s}
      .p3{animation:pfall 18s ease-in-out infinite 4s}
      .p4{animation:pfall 10s ease-in-out infinite 6s}
      .bl{animation:bloom 4.5s ease-in-out infinite}
      .tw{animation:tw 3.2s ease-in-out infinite}
      @media(prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>

  <!-- Stars -->
  <g fill="#fecdd3">
    <circle cx="120" cy="10" r=".8" class="tw"/>
    <circle cx="280" cy="6"  r="1"  class="tw"/>
    <circle cx="440" cy="12" r=".7" class="tw"/>
    <circle cx="600" cy="8"  r=".9" class="tw"/>
    <circle cx="780" cy="10" r="1"  class="tw"/>
    <circle cx="60"  cy="18" r=".6" class="tw"/>
    <circle cx="360" cy="16" r=".7" class="tw"/>
    <circle cx="820" cy="20" r=".6" class="tw"/>
  </g>

  <!-- Far torii (back, small) -->
  <g color="#3d2b4f" opacity=".45" transform="translate(200,32) scale(.48)"><use href="#torii"/></g>
  <g color="#3d2b4f" opacity=".45" transform="translate(700,32) scale(.48)"><use href="#torii"/></g>

  <!-- Mid torii -->
  <g color="#5a3d2b" opacity=".7" transform="translate(322,24) scale(.68)"><use href="#torii"/></g>
  <g color="#5a3d2b" opacity=".7" transform="translate(578,24) scale(.68)"><use href="#torii"/></g>

  <!-- Front center torii (biggest) -->
  <g color="#3d2b1f" transform="translate(450,14)"><use href="#torii"/></g>
  <g color="#ffa0b4" opacity=".12" transform="translate(450,14)"><use href="#torii"/></g>

  <!-- Sakura branch flanking left of center torii -->
  <g opacity=".82">
    <path d="M390 38 Q370 28 348 18 Q334 10 320 6" stroke="#3d2b1f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M370 28 Q360 18 354 8" stroke="#3d2b1f" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M348 18 Q342 8 338 2" stroke="#3d2b1f" stroke-width="1.1" fill="none" stroke-linecap="round"/>
    <!-- Left branch sakura clusters -->
    <use href="#skM" transform="translate(320,6)"  fill="#ffb6c8" opacity=".8"  class="bl"/>
    <use href="#skS" transform="translate(310,0)   rotate(20)"  fill="#ffa0b4" opacity=".72"/>
    <use href="#skS" transform="translate(330,2)   rotate(-18)" fill="#ffc0d0" opacity=".70"/>
    <use href="#skS" transform="translate(316,12)  rotate(8)"   fill="#ffb6c8" opacity=".65"/>
    <use href="#skM" transform="translate(354,8)"  fill="#ffa0b4" opacity=".75" class="bl"/>
    <use href="#skS" transform="translate(346,2)   rotate(25)"  fill="#ffc0d0" opacity=".68"/>
    <use href="#skS" transform="translate(362,4)   rotate(-20)" fill="#ffb6c8" opacity=".65"/>
    <!-- Scattered on branch -->
    <use href="#skS" transform="translate(374,28)  rotate(12)"  fill="#ffa0b4" opacity=".55"/>
    <use href="#skS" transform="translate(392,38)  rotate(-8)"  fill="#ffb6c8" opacity=".50"/>
  </g>

  <!-- Sakura branch flanking right of center torii (mirror) -->
  <g opacity=".82">
    <path d="M510 38 Q530 28 552 18 Q566 10 580 6" stroke="#3d2b1f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M530 28 Q540 18 546 8" stroke="#3d2b1f" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M552 18 Q558 8 562 2" stroke="#3d2b1f" stroke-width="1.1" fill="none" stroke-linecap="round"/>
    <use href="#skM" transform="translate(580,6)"  fill="#ffb6c8" opacity=".8"  class="bl"/>
    <use href="#skS" transform="translate(590,0)   rotate(-20)" fill="#ffa0b4" opacity=".72"/>
    <use href="#skS" transform="translate(570,2)   rotate(18)"  fill="#ffc0d0" opacity=".70"/>
    <use href="#skS" transform="translate(584,12)  rotate(-8)"  fill="#ffb6c8" opacity=".65"/>
    <use href="#skM" transform="translate(546,8)"  fill="#ffa0b4" opacity=".75" class="bl"/>
    <use href="#skS" transform="translate(554,2)   rotate(-25)" fill="#ffc0d0" opacity=".68"/>
    <use href="#skS" transform="translate(538,4)   rotate(20)"  fill="#ffb6c8" opacity=".65"/>
    <use href="#skS" transform="translate(526,28)  rotate(-12)" fill="#ffa0b4" opacity=".55"/>
    <use href="#skS" transform="translate(508,38)  rotate(8)"   fill="#ffb6c8" opacity=".50"/>
  </g>

  <!-- Petals blown THROUGH the torii (sense of passage) -->
  <g fill="#ffb6c8">
    <use href="#skS" transform="translate(80,22)"  class="p1"/>
    <use href="#skS" transform="translate(260,32)" class="p2"/>
    <use href="#skS" transform="translate(420,18)" class="p3"/>
    <use href="#skS" transform="translate(540,28)" class="p4"/>
    <use href="#skS" transform="translate(710,20)" class="p1"/>
    <use href="#skS" transform="translate(830,26)" class="p2"/>
  </g>
  <g fill="#ffc0d0">
    <use href="#skS" transform="translate(160,28)" class="p3"/>
    <use href="#skS" transform="translate(480,14)" class="p4"/>
    <use href="#skS" transform="translate(640,32)" class="p1"/>
  </g>

  <!-- Mist at base -->
  <rect x="0" y="52" width="900" height="36" fill="url(#mistGT)"/>
  <g class="m"  fill="#1a1a2e" opacity=".38"><ellipse cx="150" cy="68" rx="130" ry="10"/></g>
  <g class="m2" fill="#1a1a2e" opacity=".32"><ellipse cx="750" cy="64" rx="150" ry="9"/></g>
  <g class="m"  fill="#1a1a2e" opacity=".28"><ellipse cx="450" cy="72" rx="160" ry="8"/></g>
</svg>
