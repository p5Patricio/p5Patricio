<svg width="1200" height="80" viewBox="0 0 1200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .pixel { shape-rendering: crispEdges; }
    .neon-cyan { fill: #00FFCC; }
    .neon-magenta { fill: #FF00FF; }
    .metal-gray { fill: #444444; }
    .metal-shadow { fill: #222222; }
    .metal-highlight { fill: #777777; }
    .screen-bg { fill: #0D0D0D; }
    .text-8bit { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; }
    @keyframes blink-fast { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    .led-blink { animation: blink-fast 0.5s infinite; }
  </style>

  <!-- Industrial Rack Chassis -->
  <rect width="1200" height="80" class="metal-gray pixel" />
  
  <!-- Edge shading -->
  <rect width="1200" height="4" class="metal-highlight pixel" />
  <rect x="0" y="76" width="1200" height="4" class="metal-shadow pixel" />

  <!-- Rack Mount 'Ears' (Left/Right) -->
  <rect width="20" height="80" class="metal-shadow pixel" />
  <rect x="1180" y="0" width="20" height="80" class="metal-shadow pixel" />
  
  <!-- Screws (Pixel art circles/squares) -->
  <rect x="6" y="10" width="8" height="8" fill="#888" class="pixel" />
  <rect x="6" y="62" width="8" height="8" fill="#888" class="pixel" />
  <rect x="1186" y="10" width="8" height="8" fill="#888" class="pixel" />
  <rect x="1186" y="62" width="8" height="8" fill="#888" class="pixel" />

  <!-- Inner Display Area -->
  <rect x="40" y="15" width="1000" height="50" fill="#000" class="pixel" />
  <rect x="44" y="19" width="992" height="42" class="screen-bg pixel" />

  <!-- LED Diagnostic Panel -->
  <g transform="translate(1060, 20)">
    <text x="0" y="-5" font-family="monospace" font-size="8" fill="#666">DIAGNOSTICS</text>
    <rect x="0" y="0" width="10" height="10" fill="#39FF14" class="pixel" /> <!-- Ready -->
    <rect x="15" y="0" width="10" height="10" fill="#FFFF00" class="pixel led-blink" /> <!-- Active -->
    <rect x="30" y="0" width="10" height="10" fill="#FF0000" opacity="0.2" class="pixel" /> <!-- Error -->
    
    <rect x="0" y="15" width="10" height="10" fill="#00FFCC" class="pixel" /> <!-- Net -->
    <rect x="15" y="15" width="10" height="10" fill="#FF00FF" class="pixel led-blink" /> <!-- Data -->
  </g>

  <!-- Screen Content -->
  <rect x="60" y="30" width="4" height="20" class="pixel neon-cyan" />
  <text x="75" y="46" class="text-8bit" fill="#00FFCC">PROFILE::CONTACT.EXE</text>
  
  <text x="1000" y="46" text-anchor="end" class="text-8bit" fill="#444" font-size="12">ENCRYPTED_COMMS::ON</text>

  <!-- Brand Label -->
  <text x="600" y="72" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">INDUSTRIAL SYSTEMS // P5-RACK-01</text>
</svg>