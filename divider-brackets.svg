<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" width="100%" preserveAspectRatio="none">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="braceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#39d0d8"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <linearGradient id="innerBraceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#39d0d8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="80" fill="#0d1117"/>

  <!-- Subtle blueprint grid -->
  <g opacity="0.04">
    <path d="M 0 20 L 1200 20 M 0 40 L 1200 40 M 0 60 L 1200 60" stroke="#39d0d8" stroke-width="0.5"/>
    <path d="M 100 0 L 100 80 M 300 0 L 300 80 M 500 0 L 500 80 M 700 0 L 700 80 M 900 0 L 900 80 M 1100 0 L 1100 80" stroke="#39d0d8" stroke-width="0.5"/>
  </g>

  <!-- Outer braces -->
  <text x="55" y="58" font-family="monospace" font-size="52" fill="url(#braceGrad)" font-weight="300" filter="url(#glow)">{</text>
  <text x="1105" y="58" font-family="monospace" font-size="52" fill="url(#braceGrad)" font-weight="300" filter="url(#glow)">}</text>

  <!-- Middle braces -->
  <text x="95" y="54" font-family="monospace" font-size="38" fill="url(#innerBraceGrad)" font-weight="300">{</text>
  <text x="1075" y="54" font-family="monospace" font-size="38" fill="url(#innerBraceGrad)" font-weight="300">}</text>

  <!-- Inner braces -->
  <text x="125" y="50" font-family="monospace" font-size="26" fill="#39d0d8" opacity="0.15" font-weight="300">{</text>
  <text x="1050" y="50" font-family="monospace" font-size="26" fill="#39d0d8" opacity="0.15" font-weight="300">}</text>

  <!-- Floating JSON snippets -->
  <text x="180" y="35" font-family="monospace" font-size="10" fill="#79c0ff" opacity="0.2">"stack"</text>
  <text x="230" y="35" font-family="monospace" font-size="10" fill="#c9d1d9" opacity="0.15">: [</text>
  <text x="250" y="35" font-family="monospace" font-size="10" fill="#a5d6ff" opacity="0.2">"AI"</text>
  <text x="280" y="35" font-family="monospace" font-size="10" fill="#c9d1d9" opacity="0.15">,</text>
  <text x="290" y="35" font-family="monospace" font-size="10" fill="#a5d6ff" opacity="0.2">"NLP"</text>
  <text x="320" y="35" font-family="monospace" font-size="10" fill="#c9d1d9" opacity="0.15">],</text>

  <text x="850" y="60" font-family="monospace" font-size="10" fill="#79c0ff" opacity="0.18">"focus"</text>
  <text x="890" y="60" font-family="monospace" font-size="10" fill="#c9d1d9" opacity="0.12">: </text>
  <text x="905" y="60" font-family="monospace" font-size="10" fill="#a5d6ff" opacity="0.18">"sovereign"</text>

  <!-- Dotted horizontal rule -->
  <g fill="#21262d">
    <circle cx="170" cy="40" r="1.5"/>
    <circle cx="190" cy="40" r="1.5"/>
    <circle cx="210" cy="40" r="1.5"/>
    <circle cx="230" cy="40" r="1.5"/>
    <circle cx="250" cy="40" r="1.5"/>
    <circle cx="270" cy="40" r="1.5"/>
    <circle cx="290" cy="40" r="1.5"/>
    <circle cx="310" cy="40" r="1.5"/>
    <circle cx="330" cy="40" r="1.5"/>
    <circle cx="350" cy="40" r="1.5"/>
    <circle cx="370" cy="40" r="1.5"/>
    <circle cx="390" cy="40" r="1.5"/>
    <circle cx="410" cy="40" r="1.5"/>
    <circle cx="430" cy="40" r="1.5"/>
    <circle cx="450" cy="40" r="1.5"/>
    <circle cx="470" cy="40" r="1.5"/>
    <circle cx="490" cy="40" r="1.5"/>
    <circle cx="510" cy="40" r="1.5"/>
    <circle cx="530" cy="40" r="1.5"/>
    <circle cx="550" cy="40" r="1.5"/>
    <circle cx="570" cy="40" r="1.5"/>
    <circle cx="590" cy="40" r="1.5"/>
    <circle cx="610" cy="40" r="1.5"/>
    <circle cx="630" cy="40" r="1.5"/>
    <circle cx="650" cy="40" r="1.5"/>
    <circle cx="670" cy="40" r="1.5"/>
    <circle cx="690" cy="40" r="1.5"/>
    <circle cx="710" cy="40" r="1.5"/>
    <circle cx="730" cy="40" r="1.5"/>
    <circle cx="750" cy="40" r="1.5"/>
    <circle cx="770" cy="40" r="1.5"/>
    <circle cx="790" cy="40" r="1.5"/>
    <circle cx="810" cy="40" r="1.5"/>
    <circle cx="830" cy="40" r="1.5"/>
    <circle cx="850" cy="40" r="1.5"/>
    <circle cx="870" cy="40" r="1.5"/>
    <circle cx="890" cy="40" r="1.5"/>
    <circle cx="910" cy="40" r="1.5"/>
    <circle cx="930" cy="40" r="1.5"/>
    <circle cx="950" cy="40" r="1.5"/>
    <circle cx="970" cy="40" r="1.5"/>
    <circle cx="990" cy="40" r="1.5"/>
    <circle cx="1010" cy="40" r="1.5"/>
    <circle cx="1030" cy="40" r="1.5"/>
  </g>

  <!-- Center glow dot cluster -->
  <circle cx="600" cy="40" r="5" fill="#39d0d8" opacity="0.25" filter="url(#glow)">
    <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="40" r="3" fill="#58a6ff" opacity="0.6"/>
  <circle cx="600" cy="40" r="3" fill="#39d0d8" opacity="0.8"/>
  <circle cx="620" cy="40" r="3" fill="#a371f7" opacity="0.6"/>

  <!-- Corner accents -->
  <path d="M 0 78 L 50 78 L 50 80 L 0 80 Z" fill="#39d0d8" opacity="0.08"/>
  <path d="M 1200 78 L 1150 78 L 1150 80 L 1200 80 Z" fill="#a371f7" opacity="0.08"/>
</svg>