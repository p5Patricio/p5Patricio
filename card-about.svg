<svg width="1200" height="40" viewBox="0 0 1200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .pixel { shape-rendering: crispEdges; }
    .neon-cyan { fill: #00FFCC; }
    .neon-magenta { fill: #FF00FF; }
    .text-8bit { font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; }
  </style>
  
  <rect width="1200" height="40" fill="#0D0D0D" class="pixel" />
  
  <!-- Pixelated top border -->
  <rect width="1200" height="2" fill="#1A1A1A" class="pixel" />
  <rect x="0" y="0" width="4" height="40" fill="#1A1A1A" class="pixel" />
  <rect x="1196" y="0" width="4" height="40" fill="#1A1A1A" class="pixel" />
  
  <!-- File label with pixel deco -->
  <rect x="15" y="15" width="4" height="10" class="pixel neon-cyan" />
  <text x="25" y="25" class="text-8bit" fill="#00FFCC">PROFILE::ABOUT.TS</text>
  
  <!-- Status with pixel dot -->
  <rect x="1110" y="18" width="4" height="4" class="pixel neon-magenta" />
  <text x="1120" y="24" class="text-8bit" fill="#FF00FF">LIVE_DATA</text>
</svg>