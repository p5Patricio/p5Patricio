<svg width="1200" height="100" viewBox="0 0 1200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .pixel { shape-rendering: crispEdges; }
    .neon-cyan { fill: #00FFCC; }
    .neon-magenta { fill: #FF00FF; }
    .bezel-main { fill: #333333; }
    .bezel-shadow { fill: #1A1A1A; }
    .bezel-highlight { fill: #4D4D4D; }
    .screen-bg { fill: #0D0D0D; }
    .text-8bit { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; }
  </style>

  <!-- Outer Hardware Case -->
  <rect width="1200" height="100" class="bezel-main pixel" />
  
  <!-- Highlights and Shadows for 3D Effect -->
  <rect width="1200" height="4" class="bezel-highlight pixel" />
  <rect x="0" y="96" width="1200" height="4" class="bezel-shadow pixel" />
  <rect x="0" y="0" width="4" height="100" class="bezel-highlight pixel" />
  <rect x="1196" y="0" width="4" height="100" class="bezel-shadow pixel" />

  <!-- Inner Screen Frame -->
  <rect x="20" y="10" width="1160" height="60" fill="black" class="pixel" />
  <rect x="24" y="14" width="1152" height="52" class="screen-bg pixel" />
  
  <!-- Lower Control Panel -->
  <rect x="20" y="75" width="1160" height="20" class="bezel-shadow pixel" />
  
  <!-- Power LED -->
  <rect x="1150" y="82" width="6" height="6" class="pixel neon-cyan" />
  <text x="1140" y="88" text-anchor="end" font-family="monospace" font-size="8" fill="#666">PWR</text>
  
  <!-- Knobs/Buttons -->
  <rect x="40" y="81" width="12" height="8" fill="#444" class="pixel" />
  <rect x="60" y="81" width="12" height="8" fill="#444" class="pixel" />
  <rect x="80" y="81" width="12" height="8" fill="#444" class="pixel" />
  
  <!-- Brand Label -->
  <text x="600" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#555">P5-MONITOR // CRT-V1</text>

  <!-- Content on Screen -->
  <rect x="40" y="30" width="4" height="20" class="pixel neon-cyan" />
  <text x="55" y="46" class="text-8bit" fill="#00FFCC">PROFILE::ABOUT.SYS</text>
  
  <g transform="translate(1080, 32)">
    <rect x="0" y="0" width="4" height="16" class="pixel neon-magenta" />
    <text x="10" y="13" class="text-8bit" fill="#FF00FF" font-size="12">LINKED</text>
  </g>
</svg>