<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" width="100%" preserveAspectRatio="none">
  <defs>
    <linearGradient id="codeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39d0d8" stop-opacity="0"/>
      <stop offset="20%" stop-color="#39d0d8" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="60" fill="#0d1117"/>
  <!-- Comment line -->
  <text x="50%" y="35" text-anchor="middle" font-family="monospace" font-size="14" fill="#8b949e" font-weight="400">
    // ──────────────────────────────────────────────────────────
  </text>
  <!-- Glowing center line -->
  <rect x="200" y="28" width="800" height="2" rx="1" fill="url(#codeLine)"/>
  <!-- Code tokens floating -->
  <text x="80" y="24" font-family="monospace" font-size="10" fill="#ff7b72" opacity="0.4">&lt;/&gt;</text>
  <text x="1100" y="48" font-family="monospace" font-size="10" fill="#a371f7" opacity="0.4">{ }</text>
  <text x="150" y="50" font-family="monospace" font-size="10" fill="#3fb950" opacity="0.3">#</text>
  <text x="1050" y="22" font-family="monospace" font-size="10" fill="#39d0d8" opacity="0.3">$</text>
</svg>
