<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39d0d8"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="120" rx="12" fill="#0d1117" stroke="#21262d" stroke-width="1"/>

  <!-- Left edge accent -->
  <rect x="0" y="0" width="4" height="120" rx="2" fill="#1db954"/>

  <!-- Album art placeholder -->
  <rect x="20" y="20" width="80" height="80" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <!-- Flame icon inside album art -->
  <g transform="translate(38, 34)" opacity="0.8">
    <path d="M22 40C22 40 8 28 8 16C8 10 12 4 18 2C16 6 16 10 18 14C20 10 24 6 28 4C26 8 26 12 28 16C32 12 34 8 34 4C38 8 40 14 40 20C40 32 22 40 22 40Z" fill="#f78166" opacity="0.6"/>
    <path d="M22 36C22 36 14 28 14 20C14 16 16 12 20 10C18 14 20 18 22 20C24 16 26 14 28 12C28 16 28 18 30 20C32 18 34 16 34 14C36 18 36 22 36 26C36 32 22 36 22 36Z" fill="#ffbd2e" opacity="0.5"/>
  </g>
  <!-- Vinyl grooves -->
  <circle cx="60" cy="60" r="28" fill="none" stroke="#21262d" stroke-width="0.5" opacity="0.5"/>
  <circle cx="60" cy="60" r="20" fill="none" stroke="#21262d" stroke-width="0.5" opacity="0.5"/>
  <circle cx="60" cy="60" r="12" fill="none" stroke="#21262d" stroke-width="0.5" opacity="0.5"/>
  <circle cx="60" cy="60" r="4" fill="#21262d"/>

  <!-- Spinning animation on the vinyl -->
  <g opacity="0.3">
    <line x1="60" y1="32" x2="60" y2="36" stroke="#39d0d8" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- NOW PLAYING label -->
  <text x="120" y="32" font-family="monospace" font-size="9" fill="#1db954" font-weight="600" letter-spacing="1">
    <tspan>●</tspan> NOW PLAYING
  </text>

  <!-- Song title -->
  <text x="120" y="56" font-family="monospace" font-size="18" fill="#c9d1d9" font-weight="600">
    Inferno
  </text>

  <!-- Artist -->
  <text x="120" y="76" font-family="monospace" font-size="12" fill="#8b949e">
    Mrs. Green Apple
  </text>

  <!-- Anime reference -->
  <text x="120" y="92" font-family="monospace" font-size="10" fill="#8b949e" opacity="0.6">
    Fire Force OP 1
  </text>

  <!-- Progress bar background -->
  <rect x="120" y="102" width="360" height="3" rx="1.5" fill="#21262d"/>
  <!-- Progress bar fill (animated) -->
  <rect x="120" y="102" width="240" height="3" rx="1.5" fill="url(#barGrad)" filter="url(#glow)">
    <animate attributeName="width" values="0;360;0" dur="15s" repeatCount="indefinite"/>
  </rect>

  <!-- Time stamps -->
  <text x="120" y="115" font-family="monospace" font-size="8" fill="#8b949e" opacity="0.5">2:24</text>
  <text x="470" y="115" text-anchor="end" font-family="monospace" font-size="8" fill="#8b949e" opacity="0.5">3:52</text>

  <!-- Decorative corner -->
  <path d="M 496 0 L 500 0 L 500 4 L 496 4 Z" fill="#1db954" opacity="0.6"/>
</svg>