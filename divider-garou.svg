<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 88" width="900" height="88" aria-hidden="true">
  <!--
    Bamboo & mist divider — projects → experience.
    Sumi-e inspired: ink-wash bamboo silhouettes, rising mist, drifting petals.
    Calm strength without a figure — the atmosphere speaks.
  -->
  <defs>
    <linearGradient id="mistL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a2e" stop-opacity="0"/>
      <stop offset=".6" stop-color="#1a1a2e" stop-opacity=".55"/>
      <stop offset="1" stop-color="#0f0f1a" stop-opacity=".8"/>
    </linearGradient>
    <radialGradient id="lunaG" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffe4e6" stop-opacity=".95"/>
      <stop offset=".6" stop-color="#fecdd3" stop-opacity=".4"/>
      <stop offset="1" stop-color="#fecdd3" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes mist1{0%{transform:translateX(0)}50%{transform:translateX(16px)}100%{transform:translateX(0)}}
      @keyframes mist2{0%{transform:translateX(0)}50%{transform:translateX(-12px)}100%{transform:translateX(0)}}
      @keyframes moonB{0%,100%{opacity:.7}50%{opacity:1}}
      @keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(.6deg)}}
      @keyframes swayR{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-.5deg)}}
      @keyframes drift{0%{transform:translate(0,0) rotate(0);opacity:.55}100%{transform:translate(-20px,24px) rotate(-95deg);opacity:0}}
      @keyframes twink{0%,100%{opacity:.25}50%{opacity:.75}}
      .mb{animation:moonB 8s ease-in-out infinite}
      .m1{animation:mist1 18s ease-in-out infinite;transform-origin:center}
      .m2{animation:mist2 22s ease-in-out infinite;transform-origin:center}
      .sL{animation:sway 9s ease-in-out infinite;transform-origin:center bottom}
      .sR{animation:swayR 11s ease-in-out infinite;transform-origin:center bottom}
      .p{animation:drift 14s ease-in-out infinite}
      .p2{animation:drift 17s ease-in-out infinite 3s}
      .p3{animation:drift 11s ease-in-out infinite 6s}
      .tw{animation:twink 4s ease-in-out infinite}
      @media(prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>

  <!-- Moon: upper right, crescent-hinted -->
  <circle cx="820" cy="24" r="32" fill="url(#lunaG)" class="mb"/>
  <circle cx="820" cy="24" r="14" fill="#ffe4e6" opacity=".85" class="mb"/>
  <circle cx="824" cy="20" r="10" fill="#fff8f5" opacity=".55"/>

  <!-- Stars -->
  <g fill="#fecdd3">
    <circle cx="60"  cy="14" r=".8" class="tw"/>
    <circle cx="148" cy="8"  r="1"  class="tw"/>
    <circle cx="220" cy="16" r=".7" class="tw"/>
    <circle cx="360" cy="10" r=".9" class="tw"/>
    <circle cx="500" cy="6"  r=".8" class="tw"/>
    <circle cx="620" cy="18" r="1"  class="tw"/>
    <circle cx="700" cy="8"  r=".7" class="tw"/>
  </g>

  <!-- Bamboo left group (detailed ink-wash style) -->
  <g class="sL" opacity=".88">
    <!-- Stalk 1 -->
    <line x1="34" y1="88" x2="30" y2="0" stroke="#2a4835" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="34" y1="88" x2="30" y2="0" stroke="#1e3428" stroke-width="2.5" stroke-linecap="round" opacity=".5"/>
    <line x1="30" y1="22" x2="22" y2="14" stroke="#2a4835" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <line x1="30" y1="22" x2="38" y2="12" stroke="#2a4835" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <line x1="30" y1="44" x2="20" y2="36" stroke="#2a4835" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <line x1="30" y1="44" x2="40" y2="34" stroke="#2a4835" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <line x1="30" y1="66" x2="22" y2="58" stroke="#2a4835" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- joints -->
    <rect x="27" y="20" width="7" height="2" rx="1" fill="#1e3428" opacity=".7"/>
    <rect x="27" y="42" width="7" height="2" rx="1" fill="#1e3428" opacity=".7"/>
    <rect x="27" y="64" width="7" height="2" rx="1" fill="#1e3428" opacity=".7"/>
    <!-- Stalk 2 (offset) -->
    <line x1="52" y1="88" x2="56" y2="4" stroke="#2a4835" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="56" y1="28" x2="64" y2="18" stroke="#2a4835" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <line x1="56" y1="28" x2="46" y2="16" stroke="#2a4835" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <line x1="56" y1="52" x2="64" y2="42" stroke="#2a4835" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <rect x="53" y="26" width="7" height="2" rx="1" fill="#1e3428" opacity=".7"/>
    <rect x="53" y="50" width="7" height="2" rx="1" fill="#1e3428" opacity=".7"/>
    <rect x="53" y="74" width="7" height="2" rx="1" fill="#1e3428" opacity=".7"/>
    <!-- Stalk 3 (thinner, back) -->
    <line x1="18" y1="88" x2="14" y2="10" stroke="#2a4835" stroke-width="3" stroke-linecap="round" opacity=".6"/>
    <line x1="14" y1="36" x2="6" y2="26" stroke="#2a4835" stroke-width="1.2" fill="none" stroke-linecap="round" opacity=".6"/>
    <rect x="11" y="34" width="5" height="1.5" rx="1" fill="#1e3428" opacity=".5"/>
    <rect x="11" y="58" width="5" height="1.5" rx="1" fill="#1e3428" opacity=".5"/>
  </g>

  <!-- Bamboo right group (mirrored) -->
  <g class="sR" opacity=".88">
    <line x1="866" y1="88" x2="870" y2="0" stroke="#2a4835" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="866" y1="88" x2="870" y2="0" stroke="#1e3428" stroke-width="2.5" stroke-linecap="round" opacity=".5"/>
    <line x1="870" y1="22" x2="878" y2="14" stroke="#2a4835" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <line x1="870" y1="22" x2="862" y2="12" stroke="#2a4835" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <line x1="870" y1="44" x2="880" y2="36" stroke="#2a4835" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <line x1="870" y1="44" x2="860" y2="34" stroke="#2a4835" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <line x1="870" y1="66" x2="878" y2="58" stroke="#2a4835" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <rect x="866" y="20" width="7" height="2" rx="1" fill="#1e3428" opacity=".7"/>
    <rect x="866" y="42" width="7" height="2" rx="1" fill="#1e3428" opacity=".7"/>
    <rect x="866" y="64" width="7" height="2" rx="1" fill="#1e3428" opacity=".7"/>
    <line x1="848" y1="88" x2="844" y2="4" stroke="#2a4835" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="844" y1="28" x2="836" y2="18" stroke="#2a4835" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <line x1="844" y1="28" x2="854" y2="16" stroke="#2a4835" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <line x1="844" y1="52" x2="836" y2="42" stroke="#2a4835" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <rect x="840" y="26" width="7" height="2" rx="1" fill="#1e3428" opacity=".7"/>
    <rect x="840" y="50" width="7" height="2" rx="1" fill="#1e3428" opacity=".7"/>
    <rect x="840" y="74" width="7" height="2" rx="1" fill="#1e3428" opacity=".7"/>
    <line x1="882" y1="88" x2="886" y2="10" stroke="#2a4835" stroke-width="3" stroke-linecap="round" opacity=".6"/>
    <line x1="886" y1="36" x2="894" y2="26" stroke="#2a4835" stroke-width="1.2" fill="none" stroke-linecap="round" opacity=".6"/>
    <rect x="884" y="34" width="5" height="1.5" rx="1" fill="#1e3428" opacity=".5"/>
    <rect x="884" y="58" width="5" height="1.5" rx="1" fill="#1e3428" opacity=".5"/>
  </g>

  <!-- Mist bands -->
  <g class="m1" fill="#1a1a2e" opacity=".45">
    <ellipse cx="250" cy="72" rx="200" ry="8"/>
    <ellipse cx="660" cy="68" rx="180" ry="6"/>
  </g>
  <g class="m2" fill="#fecdd3" opacity=".06">
    <ellipse cx="450" cy="76" rx="220" ry="6"/>
  </g>
  <rect x="0" y="72" width="900" height="16" fill="url(#mistL)"/>

  <!-- Drifting sakura petals -->
  <g fill="#ffb6c8">
    <ellipse cx="160" cy="20" rx="2.2" ry="1.2" transform="rotate(18 160 20)" class="p"/>
    <ellipse cx="310" cy="38" rx="2" ry="1.1" transform="rotate(-14 310 38)" class="p2"/>
    <ellipse cx="560" cy="16" rx="2.2" ry="1.2" transform="rotate(22 560 16)" class="p3"/>
    <ellipse cx="700" cy="42" rx="2" ry="1.1" transform="rotate(-20 700 42)" class="p"/>
  </g>
</svg>
