<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes subtle-glow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    @keyframes line-draw { 0% { stroke-dashoffset: 1200; } 100% { stroke-dashoffset: 0; } }
    .grid-dot { fill: #333; }
    .arch-line { stroke: #222; stroke-width: 0.5; }
    .accent-line { stroke: #00ccff; stroke-width: 1; stroke-dasharray: 1200; animation: line-draw 2s ease-out forwards; }
    .text-premium { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #f0f0f0; letter-spacing: 0.2em; font-weight: 300; }
    .text-title { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #00ccff; letter-spacing: 0.4em; font-weight: 200; font-size: 14px; }
    .intersection { fill: #00ccff; animation: subtle-glow 3s ease-in-out infinite; }
  </style>

  <rect width="1200" height="400" fill="#0d0d0d" />

  <!-- Background Grid Dots -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="0.5" class="grid-dot" />
  </pattern>
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Architectural Abstract Lines -->
  <line x1="0" y1="300" x2="1200" y2="300" class="arch-line" />
  <line x1="400" y1="0" x2="400" y2="400" class="arch-line" />
  <line x1="800" y1="0" x2="800" y2="400" class="arch-line" />
  
  <path d="M 0 350 L 1200 350" class="accent-line" style="opacity: 0.2;" />
  <path d="M 100 0 L 100 400" class="arch-line" opacity="0.3" />

  <!-- Intersections Points -->
  <circle cx="400" cy="300" r="2" class="intersection" />
  <circle cx="800" cy="300" r="2" class="intersection" style="animation-delay: 1.5s;" />

  <!-- Main Identity Text -->
  <g transform="translate(600, 180)">
    <text text-anchor="middle" class="text-premium" font-size="36" y="0">PATRICIO GARCÍA</text>
    <text text-anchor="middle" class="text-title" y="40">SOFTWARE ENGINEER &amp; AI RESEARCHER</text>
  </g>

  <!-- Fine Details -->
  <text x="415" y="290" font-family="monospace" font-size="8" fill="#555">COORD_X.400_Y.300</text>
  <text x="815" y="290" font-family="monospace" font-size="8" fill="#555">SYS_STATUS.NOMINAL</text>

  <!-- Border Frame -->
  <rect x="20" y="20" width="1160" height="360" stroke="#00ccff" stroke-width="0.5" stroke-opacity="0.2" fill="none" />
</svg>