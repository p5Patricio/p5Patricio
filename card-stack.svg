<svg width="1200" height="120" viewBox="0 0 1200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .pixel { shape-rendering: crispEdges; }
    .neon-cyan { fill: #00FFCC; }
    .neon-magenta { fill: #FF00FF; }
    .mac-beige { fill: #D7D3C8; }
    .mac-shadow { fill: #B2AF9E; }
    .mac-highlight { fill: #EFEDE8; }
    .screen-bg { fill: #0D0D0D; }
    .text-8bit { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; }
  </style>

  <!-- Main Mac Case -->
  <rect width="1200" height="120" class="mac-beige pixel" />
  
  <!-- 3D Edges -->
  <rect width="1200" height="4" class="mac-highlight pixel" />
  <rect x="0" y="116" width="1200" height="4" class="mac-shadow pixel" />
  <rect x="0" y="0" width="4" height="120" class="mac-highlight pixel" />
  <rect x="1196" y="0" width="4" height="120" class="mac-shadow pixel" />

  <!-- Recessed Screen Area -->
  <rect x="30" y="15" width="1000" height="70" fill="#000" class="pixel" />
  <rect x="34" y="19" width="992" height="62" class="screen-bg pixel" />

  <!-- Floppy Disk Slot (Right side) -->
  <rect x="1060" y="40" width="100" height="8" fill="#555" class="pixel" />
  <rect x="1060" y="48" width="100" height="2" fill="#333" class="pixel" />
  <text x="1110" y="35" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">DISK DRIVE</text>

  <!-- Rainbow Logo (Pixelated Simulation) -->
  <g transform="translate(1060, 80)">
    <rect x="0" y="0" width="8" height="2" fill="#39FF14" class="pixel" />
    <rect x="0" y="2" width="8" height="2" fill="#FFFF00" class="pixel" />
    <rect x="0" y="4" width="8" height="2" fill="#FF00FF" class="pixel" />
    <rect x="0" y="6" width="8" height="2" fill="#00FFCC" class="pixel" />
  </g>
  <text x="1075" y="90" font-family="monospace" font-size="10" font-weight="bold" fill="#777">P5-128K</text>

  <!-- Ventilation Vents (Bottom left) -->
  <rect x="30" y="95" width="40" height="2" class="mac-shadow pixel" />
  <rect x="30" y="100" width="40" height="2" class="mac-shadow pixel" />
  <rect x="30" y="105" width="40" height="2" class="mac-shadow pixel" />

  <!-- Screen Content -->
  <rect x="50" y="35" width="4" height="30" class="pixel neon-cyan" />
  <text x="65" y="55" class="text-8bit" fill="#00FFCC">PROFILE::STACK.INF</text>
  
  <g transform="translate(900, 42)">
    <rect x="0" y="0" width="16" height="16" class="pixel neon-magenta" opacity="0.4" />
    <text x="20" y="13" class="text-8bit" fill="#FF00FF" font-size="12">STABLE</text>
  </g>
</svg>