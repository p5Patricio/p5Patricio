<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 88" width="900" height="88" aria-hidden="true">
  <defs>
    <linearGradient id="mtA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d2b4f" stop-opacity=".7"/>
      <stop offset="1" stop-color="#1a1a2e" stop-opacity=".95"/>
    </linearGradient>
    <linearGradient id="mtB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a3d6a" stop-opacity=".5"/>
      <stop offset="1" stop-color="#1a1a2e" stop-opacity=".8"/>
    </linearGradient>
    <linearGradient id="mtC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a5480" stop-opacity=".3"/>
      <stop offset="1" stop-color="#3d2b4f" stop-opacity=".6"/>
    </linearGradient>
    <radialGradient id="fujiSnow" cx="50%" cy="0%" r="50%">
      <stop offset="0" stop-color="#fecdd3" stop-opacity=".55"/>
      <stop offset="1" stop-color="#fecdd3" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes drift1{0%{transform:translateX(-20px)}100%{transform:translateX(20px)}}
      @keyframes drift2{0%{transform:translateX(20px)}100%{transform:translateX(-20px)}}
      @keyframes twinkle{0%,100%{opacity:.35}50%{opacity:.85}}
      .mist1{animation:drift1 16s ease-in-out infinite alternate}
      .mist2{animation:drift2 22s ease-in-out infinite alternate}
      .tw{animation:twinkle 3.4s ease-in-out infinite}
      @media(prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>

  <!-- Stars -->
  <g fill="#fecdd3">
    <circle cx="80" cy="10" r=".9" class="tw"/>
    <circle cx="180" cy="6" r=".7" class="tw"/>
    <circle cx="270" cy="14" r="1" class="tw"/>
    <circle cx="380" cy="8" r=".8" class="tw"/>
    <circle cx="520" cy="12" r="1" class="tw"/>
    <circle cx="640" cy="8" r=".9" class="tw"/>
    <circle cx="760" cy="16" r=".7" class="tw"/>
    <circle cx="860" cy="10" r="1" class="tw"/>
  </g>

  <!-- Distant back range (3rd plane) -->
  <path d="M0 70 L80 50 L160 60 L240 42 L330 55 L420 38 L510 50 L600 40 L690 54 L780 44 L860 56 L900 50 L900 88 L0 88 Z"
        fill="url(#mtC)"/>

  <!-- Middle range (2nd plane) -->
  <path d="M0 76 L60 62 L140 70 L220 52 L310 64 L400 48 L470 58 L560 46 L650 60 L740 52 L820 64 L900 58 L900 88 L0 88 Z"
        fill="url(#mtB)"/>

  <!-- Mt Fuji center piece (front) -->
  <g>
    <!-- Main cone -->
    <path d="M360 80 L420 38 L440 26 L460 38 L520 80 Z" fill="url(#mtA)"/>
    <!-- Snow cap -->
    <path d="M424 36 L440 26 L456 36 L448 40 L440 37 L432 40 Z" fill="#fecdd3" opacity=".85"/>
    <path d="M424 36 L440 26 L456 36 L448 40 L440 37 L432 40 Z" fill="url(#fujiSnow)"/>
    <!-- Snow streaks down ridge -->
    <path d="M440 37 L438 44 L436 50" stroke="#fecdd3" stroke-width="1" fill="none" opacity=".5"/>
    <path d="M440 37 L442 44 L444 50" stroke="#fecdd3" stroke-width="1" fill="none" opacity=".5"/>
  </g>

  <!-- Front range (flanking Fuji) -->
  <path d="M0 82 L40 72 L110 78 L180 68 L260 76 L340 80 L360 80 L520 80 L560 78 L640 70 L720 78 L800 72 L860 78 L900 74 L900 88 L0 88 Z"
        fill="#0f0f1a" opacity=".9"/>

  <!-- Mist bands -->
  <g class="mist1" fill="#fecdd3" opacity=".14">
    <ellipse cx="200" cy="64" rx="180" ry="5"/>
    <ellipse cx="680" cy="60" rx="160" ry="4"/>
  </g>
  <g class="mist2" fill="#ffb6c8" opacity=".1">
    <ellipse cx="440" cy="58" rx="200" ry="4"/>
  </g>

  <!-- Pine silhouettes in foreground corners -->
  <g fill="#0f0f1a">
    <path d="M30 82 L28 72 L26 76 L24 70 L22 74 L20 66 L18 72 L16 76 L14 74 L12 80 L30 82 Z"/>
    <path d="M872 82 L874 70 L876 74 L878 68 L880 72 L882 66 L884 72 L886 78 L888 74 L890 80 L872 82 Z"/>
  </g>
</svg>
