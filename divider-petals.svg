<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 88" width="900" height="88" aria-hidden="true">
  <defs>
    <!-- Authentic 5-petal sakura shapes — used instead of ellipses -->
    <symbol id="sk5s" overflow="visible">
      <path d="M0,0 C1.8,-1.5 3,-4.4 1.7,-7 Q.8,-8.3 0,-7.9 Q-.8,-8.3 -1.7,-7 C-3,-4.4 -1.8,-1.5 0,0Z" transform="rotate(0)"/>
      <path d="M0,0 C1.8,-1.5 3,-4.4 1.7,-7 Q.8,-8.3 0,-7.9 Q-.8,-8.3 -1.7,-7 C-3,-4.4 -1.8,-1.5 0,0Z" transform="rotate(72)"/>
      <path d="M0,0 C1.8,-1.5 3,-4.4 1.7,-7 Q.8,-8.3 0,-7.9 Q-.8,-8.3 -1.7,-7 C-3,-4.4 -1.8,-1.5 0,0Z" transform="rotate(144)"/>
      <path d="M0,0 C1.8,-1.5 3,-4.4 1.7,-7 Q.8,-8.3 0,-7.9 Q-.8,-8.3 -1.7,-7 C-3,-4.4 -1.8,-1.5 0,0Z" transform="rotate(216)"/>
      <path d="M0,0 C1.8,-1.5 3,-4.4 1.7,-7 Q.8,-8.3 0,-7.9 Q-.8,-8.3 -1.7,-7 C-3,-4.4 -1.8,-1.5 0,0Z" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="1" fill="#fff8f5"/>
    </symbol>
    <symbol id="sk5m" overflow="visible">
      <path d="M0,0 C2.8,-2.3 4.6,-6.8 2.6,-10.8 Q1.2,-12.8 0,-12.2 Q-1.2,-12.8 -2.6,-10.8 C-4.6,-6.8 -2.8,-2.3 0,0Z" transform="rotate(0)"/>
      <path d="M0,0 C2.8,-2.3 4.6,-6.8 2.6,-10.8 Q1.2,-12.8 0,-12.2 Q-1.2,-12.8 -2.6,-10.8 C-4.6,-6.8 -2.8,-2.3 0,0Z" transform="rotate(72)"/>
      <path d="M0,0 C2.8,-2.3 4.6,-6.8 2.6,-10.8 Q1.2,-12.8 0,-12.2 Q-1.2,-12.8 -2.6,-10.8 C-4.6,-6.8 -2.8,-2.3 0,0Z" transform="rotate(144)"/>
      <path d="M0,0 C2.8,-2.3 4.6,-6.8 2.6,-10.8 Q1.2,-12.8 0,-12.2 Q-1.2,-12.8 -2.6,-10.8 C-4.6,-6.8 -2.8,-2.3 0,0Z" transform="rotate(216)"/>
      <path d="M0,0 C2.8,-2.3 4.6,-6.8 2.6,-10.8 Q1.2,-12.8 0,-12.2 Q-1.2,-12.8 -2.6,-10.8 C-4.6,-6.8 -2.8,-2.3 0,0Z" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="1.4" fill="#fff8f5"/>
    </symbol>
    <style>
      @keyframes fallA{0%{transform:translate(0,0) rotate(0);opacity:0}8%{opacity:.75}90%{opacity:.5}100%{transform:translate(-28px,88px) rotate(200deg);opacity:0}}
      @keyframes fallB{0%{transform:translate(0,0) rotate(0);opacity:0}8%{opacity:.65}90%{opacity:.4}100%{transform:translate(22px,88px) rotate(-160deg);opacity:0}}
      @keyframes fallC{0%{transform:translate(0,0) rotate(20deg);opacity:0}10%{opacity:.6}90%{opacity:.35}100%{transform:translate(-12px,88px) rotate(110deg);opacity:0}}
      @keyframes fallD{0%{transform:translate(0,0) rotate(-15deg);opacity:0}12%{opacity:.7}90%{opacity:.45}100%{transform:translate(18px,88px) rotate(-220deg);opacity:0}}
      @keyframes bloom{0%,100%{opacity:.5}50%{opacity:.85}}
      @keyframes hline{0%{opacity:.08;transform:scaleX(.2)}50%{opacity:.35}100%{opacity:.08;transform:scaleX(1)}}
      .a{animation:fallA linear infinite}
      .b{animation:fallB linear infinite}
      .c{animation:fallC linear infinite}
      .d{animation:fallD linear infinite}
      .bl{animation:bloom 4.8s ease-in-out infinite}
      .hl{animation:hline 7s ease-in-out infinite;transform-origin:left center}
      @media(prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>

  <!-- Subtle reading lines -->
  <g stroke="#ffb6c8" stroke-width=".5" fill="none">
    <line x1="30" y1="44" x2="388" y2="44" opacity=".22" class="hl"/>
    <line x1="512" y1="44" x2="870" y2="44" opacity=".22" class="hl" style="animation-delay:3.5s"/>
  </g>

  <!-- Center sakura flower (the focal point of the divider) -->
  <g transform="translate(450,44)">
    <use href="#sk5m" fill="#ffb6c8" opacity=".85" class="bl"/>
    <use href="#sk5s" transform="translate(-18,-2) rotate(15)" fill="#ffa0b4" opacity=".6"/>
    <use href="#sk5s" transform="translate(18,-2) rotate(-15)" fill="#ffc0d0" opacity=".6"/>
    <use href="#sk5s" transform="translate(-10,12) rotate(30)" fill="#ffb6c8" opacity=".5"/>
    <use href="#sk5s" transform="translate(10,12) rotate(-30)" fill="#ffa0b4" opacity=".5"/>
  </g>

  <!-- Side sakura clusters — left and right of center -->
  <g transform="translate(220,36)">
    <use href="#sk5s" fill="#ffb6c8" opacity=".65" class="bl"/>
    <use href="#sk5s" transform="translate(-10,-6) rotate(20)" fill="#ffa0b4" opacity=".5"/>
    <use href="#sk5s" transform="translate(8,-8) rotate(-18)" fill="#ffc0d0" opacity=".48"/>
  </g>
  <g transform="translate(680,36)">
    <use href="#sk5s" fill="#ffb6c8" opacity=".65" class="bl"/>
    <use href="#sk5s" transform="translate(10,-6) rotate(-20)" fill="#ffa0b4" opacity=".5"/>
    <use href="#sk5s" transform="translate(-8,-8) rotate(18)" fill="#ffc0d0" opacity=".48"/>
  </g>

  <!-- Tiny twig snippets (branch context for the flowers) -->
  <path d="M196 38 Q208 34 220 36" stroke="#3d2b1f" stroke-width="1" fill="none" opacity=".45"/>
  <path d="M680 36 Q692 34 704 38" stroke="#3d2b1f" stroke-width="1" fill="none" opacity=".45"/>
  <path d="M420 44 Q435 40 450 44" stroke="#3d2b1f" stroke-width="1.2" fill="none" opacity=".4"/>
  <path d="M450 44 Q465 40 480 44" stroke="#3d2b1f" stroke-width="1.2" fill="none" opacity=".4"/>

  <!-- ===== FALLING SAKURA PETALS — proper 5-petal shapes, staggered ===== -->
  <!-- Pink group -->
  <g fill="#ffb6c8">
    <use href="#sk5s" transform="translate(40,-8)" class="a" style="animation-duration:9s;animation-delay:0s"/>
    <use href="#sk5s" transform="translate(96,-8)" class="b" style="animation-duration:11.5s;animation-delay:2.3s"/>
    <use href="#sk5s" transform="translate(152,-8)" class="c" style="animation-duration:13s;animation-delay:.7s"/>
    <use href="#sk5s" transform="translate(208,-8)" class="a" style="animation-duration:10s;animation-delay:4.1s"/>
    <use href="#sk5s" transform="translate(264,-8)" class="b" style="animation-duration:12s;animation-delay:1.4s"/>
    <use href="#sk5s" transform="translate(320,-8)" class="d" style="animation-duration:8.5s;animation-delay:5.8s"/>
    <use href="#sk5s" transform="translate(376,-8)" class="a" style="animation-duration:11s;animation-delay:3.2s"/>
    <use href="#sk5s" transform="translate(432,-8)" class="c" style="animation-duration:14s;animation-delay:6.5s"/>
  </g>
  <!-- Soft pink group -->
  <g fill="#ffa0b4">
    <use href="#sk5s" transform="translate(510,-8)" class="b" style="animation-duration:10.5s;animation-delay:.4s"/>
    <use href="#sk5s" transform="translate(566,-8)" class="a" style="animation-duration:13.5s;animation-delay:2.9s"/>
    <use href="#sk5s" transform="translate(622,-8)" class="d" style="animation-duration:9.5s;animation-delay:5.1s"/>
    <use href="#sk5s" transform="translate(678,-8)" class="c" style="animation-duration:11.5s;animation-delay:1.8s"/>
    <use href="#sk5s" transform="translate(734,-8)" class="a" style="animation-duration:12.5s;animation-delay:4.6s"/>
    <use href="#sk5s" transform="translate(790,-8)" class="b" style="animation-duration:10s;animation-delay:.9s"/>
    <use href="#sk5s" transform="translate(846,-8)" class="d" style="animation-duration:13s;animation-delay:3.7s"/>
    <use href="#sk5s" transform="translate(880,-8)" class="c" style="animation-duration:11s;animation-delay:6.2s"/>
  </g>
  <!-- Light pink (off-beat) -->
  <g fill="#ffc0d0">
    <use href="#sk5s" transform="translate(68,-8)" class="d" style="animation-duration:10.5s;animation-delay:5.3s"/>
    <use href="#sk5s" transform="translate(180,-8)" class="b" style="animation-duration:12s;animation-delay:2.1s"/>
    <use href="#sk5s" transform="translate(292,-8)" class="a" style="animation-duration:15s;animation-delay:6.8s"/>
    <use href="#sk5s" transform="translate(404,-8)" class="d" style="animation-duration:9s;animation-delay:3.5s"/>
    <use href="#sk5s" transform="translate(538,-8)" class="c" style="animation-duration:11.5s;animation-delay:5.9s"/>
    <use href="#sk5s" transform="translate(650,-8)" class="a" style="animation-duration:13s;animation-delay:1.2s"/>
    <use href="#sk5s" transform="translate(762,-8)" class="b" style="animation-duration:14s;animation-delay:4s"/>
    <use href="#sk5s" transform="translate(862,-8)" class="d" style="animation-duration:10s;animation-delay:2.6s"/>
  </g>
  <!-- Medium flowers (focal fall moments) -->
  <g fill="#ffb6c8">
    <use href="#sk5m" transform="translate(130,-4)" class="b" style="animation-duration:16s;animation-delay:1.6s"/>
    <use href="#sk5m" transform="translate(340,-4)" class="c" style="animation-duration:18s;animation-delay:4.4s"/>
    <use href="#sk5m" transform="translate(560,-4)" class="a" style="animation-duration:15s;animation-delay:7.2s"/>
    <use href="#sk5m" transform="translate(760,-4)" class="d" style="animation-duration:17s;animation-delay:2.8s"/>
  </g>
</svg>
