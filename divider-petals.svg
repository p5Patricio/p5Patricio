<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 88" width="900" height="88" aria-hidden="true">
  <defs>
    <!-- Petal shape (five-lobed sakura petal) -->
    <symbol id="pt" overflow="visible">
      <path d="M0,0 C2,-1 3.4,-3.6 2,-6 Q1,-7 0,-6.6 Q-1,-7 -2,-6 C-3.4,-3.6 -2,-1 0,0 Z"/>
    </symbol>
    <style>
      @keyframes fallA{0%{transform:translate(0,0) rotate(0);opacity:0}10%{opacity:.7}100%{transform:translate(-32px,88px) rotate(180deg);opacity:0}}
      @keyframes fallB{0%{transform:translate(0,0) rotate(0);opacity:0}10%{opacity:.6}100%{transform:translate(26px,88px) rotate(-140deg);opacity:0}}
      @keyframes fallC{0%{transform:translate(0,0) rotate(0);opacity:0}15%{opacity:.5}100%{transform:translate(-14px,88px) rotate(90deg);opacity:0}}
      @keyframes hline{0%{opacity:.1;transform:scaleX(.3)}50%{opacity:.4}100%{opacity:.1;transform:scaleX(1)}}
      .a{animation:fallA 9s linear infinite}
      .b{animation:fallB 11s linear infinite}
      .c{animation:fallC 13s linear infinite}
      .h{animation:hline 6s ease-in-out infinite;transform-origin:left center}
      @media(prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>

  <!-- Faint horizontal reading lines — design cue that reinforces 'divider' role -->
  <g stroke="#ffb6c8" stroke-width=".5" fill="none">
    <line x1="40" y1="44" x2="380" y2="44" opacity=".25" class="h"/>
    <line x1="520" y1="44" x2="860" y2="44" opacity=".25" class="h" style="animation-delay:3s"/>
  </g>
  <!-- Center diamond accent -->
  <g transform="translate(450,44) rotate(45)" fill="none" stroke="#ffb6c8" stroke-width=".7" opacity=".55">
    <rect x="-4" y="-4" width="8" height="8"/>
    <circle cx="0" cy="0" r="1.2" fill="#ffa0b4" opacity="1"/>
  </g>

  <!-- Falling petals, staggered across x-axis, different delays and durations -->
  <g fill="#ffb6c8">
    <use href="#pt" transform="translate(40,-6)" class="a" style="animation-delay:0s"/>
    <use href="#pt" transform="translate(92,-6)" class="b" style="animation-delay:2.3s"/>
    <use href="#pt" transform="translate(144,-6)" class="c" style="animation-delay:.7s"/>
    <use href="#pt" transform="translate(196,-6)" class="a" style="animation-delay:4.1s"/>
    <use href="#pt" transform="translate(248,-6)" class="b" style="animation-delay:1.4s"/>
    <use href="#pt" transform="translate(300,-6)" class="c" style="animation-delay:5.8s"/>
    <use href="#pt" transform="translate(352,-6)" class="a" style="animation-delay:3.2s"/>
    <use href="#pt" transform="translate(404,-6)" class="b" style="animation-delay:6.5s"/>
  </g>
  <g fill="#ffa0b4">
    <use href="#pt" transform="translate(496,-6)" class="c" style="animation-delay:.4s"/>
    <use href="#pt" transform="translate(548,-6)" class="a" style="animation-delay:2.9s"/>
    <use href="#pt" transform="translate(600,-6)" class="b" style="animation-delay:5.1s"/>
    <use href="#pt" transform="translate(652,-6)" class="c" style="animation-delay:1.8s"/>
    <use href="#pt" transform="translate(704,-6)" class="a" style="animation-delay:4.6s"/>
    <use href="#pt" transform="translate(756,-6)" class="b" style="animation-delay:.9s"/>
    <use href="#pt" transform="translate(808,-6)" class="c" style="animation-delay:3.7s"/>
    <use href="#pt" transform="translate(860,-6)" class="a" style="animation-delay:6.2s"/>
  </g>
  <g fill="#ffc0d0">
    <use href="#pt" transform="translate(66,-6)" class="b" style="animation-delay:5.3s"/>
    <use href="#pt" transform="translate(170,-6)" class="c" style="animation-delay:2.1s"/>
    <use href="#pt" transform="translate(278,-6)" class="a" style="animation-delay:6.8s"/>
    <use href="#pt" transform="translate(380,-6)" class="b" style="animation-delay:3.5s"/>
    <use href="#pt" transform="translate(520,-6)" class="c" style="animation-delay:6s"/>
    <use href="#pt" transform="translate(628,-6)" class="a" style="animation-delay:1.2s"/>
    <use href="#pt" transform="translate(732,-6)" class="b" style="animation-delay:4s"/>
    <use href="#pt" transform="translate(836,-6)" class="c" style="animation-delay:2.6s"/>
  </g>
</svg>
