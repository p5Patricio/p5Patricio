<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39d0d8" stop-opacity="0"/>
      <stop offset="25%" stop-color="#39d0d8" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#a371f7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
  </defs>

  <!-- Main background -->
  <rect width="1200" height="160" rx="12" fill="url(#bgGrad)"/>

  <!-- Top glow edge -->
  <rect x="0" y="0" width="1200" height="2" rx="1" fill="url(#topGrad)"/>
  <rect x="350" y="0" width="500" height="1.5" rx="0.75" fill="#39d0d8" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Decorative circuit traces at top -->
  <g opacity="0.08">
    <path d="M 0 12 L 80 12 L 90 6 L 150 6" fill="none" stroke="#39d0d8" stroke-width="1"/>
    <path d="M 1200 12 L 1120 12 L 1110 6 L 1050 6" fill="none" stroke="#58a6ff" stroke-width="1"/>
    <circle cx="90" cy="6" r="1.5" fill="#39d0d8"/>
    <circle cx="1110" cy="6" r="1.5" fill="#58a6ff"/>
  </g>

  <!-- Terminal prompt area -->
  <text x="60" y="52" font-family="monospace" font-size="15" fill="#7ee787">$ </text>
  <text x="84" y="52" font-family="monospace" font-size="15" fill="#c9d1d9">git log --oneline -1</text>

  <!-- Commit info -->
  <text x="60" y="82" font-family="monospace" font-size="14" fill="#f78166">a1b2c3d</text>
  <text x="145" y="82" font-family="monospace" font-size="14" fill="#8b949e">(HEAD → main, origin/main)</text>
  <text x="380" y="82" font-family="monospace" font-size="14" fill="#c9d1d9">Hay que dar un paso a la vez. Solo uno a la vez.</text>

  <!-- Separator line above status bar -->
  <rect x="20" y="105" width="1160" height="1" rx="0.5" fill="#21262d"/>

  <!-- Status bar background -->
  <rect x="0" y="120" width="1200" height="40" rx="12" fill="#161b22"/>
  <rect x="0" y="120" width="1200" height="28" fill="#161b22"/>

  <!-- Status bar left: branch -->
  <text x="20" y="145" font-family="monospace" font-size="11" fill="#8b949e">
    <tspan fill="#39d0d8"></tspan> main
  </text>
  <circle cx="110" cy="141" r="3" fill="#3fb950"/>
  <text x="118" y="145" font-family="monospace" font-size="10" fill="#8b949e">0⇅0</text>

  <!-- Errors / Warnings -->
  <text x="170" y="145" font-family="monospace" font-size="11" fill="#8b949e">
    <tspan fill="#f78166">●</tspan> 0 <tspan fill="#d29922">●</tspan> 0
  </text>

  <!-- Line / Column -->
  <text x="250" y="145" font-family="monospace" font-size="11" fill="#8b949e">Ln 340, Col 1</text>

  <!-- Encoding -->
  <text x="380" y="145" font-family="monospace" font-size="11" fill="#8b949e">UTF-8</text>

  <!-- Language mode -->
  <text x="460" y="145" font-family="monospace" font-size="11" fill="#8b949e">Markdown</text>

  <!-- Center: session info -->
  <text x="50%" y="145" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e" opacity="0.6">
    GitHub Profile — p5Patricio
  </text>

  <!-- Right side indicators -->
  <text x="980" y="145" font-family="monospace" font-size="11" fill="#8b949e" opacity="0.7">Prettier</text>

  <!-- Bell icon (notification) -->
  <text x="1060" y="145" font-family="monospace" font-size="12" fill="#8b949e" opacity="0.7">🔔</text>

  <!-- Profile avatar placeholder -->
  <circle cx="1140" cy="140" r="10" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="1136" y="144" font-family="monospace" font-size="10" fill="#8b949e">P5</text>

  <!-- Bottom edge decorative line -->
  <rect x="0" y="158" width="1200" height="2" rx="1" fill="#21262d"/>

  <!-- EOF comment -->
  <text x="1140" y="100" font-family="monospace" font-size="10" fill="#8b949e" opacity="0.2">// EOF</text>

  <!-- Small decorative dots in upper right -->
  <circle cx="1160" cy="40" r="2.5" fill="#21262d"/>
  <circle cx="1175" cy="40" r="2.5" fill="#21262d"/>
  <circle cx="1190" cy="40" r="2.5" fill="#21262d"/>

  <!-- Connection nodes to status bar -->
  <circle cx="20" cy="120" r="2" fill="#39d0d8" opacity="0.4"/>
  <circle cx="380" cy="120" r="2" fill="#58a6ff" opacity="0.4"/>
  <circle cx="900" cy="120" r="2" fill="#a371f7" opacity="0.4"/>
</svg>