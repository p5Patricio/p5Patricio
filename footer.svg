<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="900" height="120">
  <defs>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#0f0f1a;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  
  <rect width="900" height="120" fill="url(#footerGrad)"/>
  
  <!-- Ground line -->
  <path d="M0 80 Q100 75 200 82 Q300 78 400 80 Q500 76 600 81 Q700 77 800 80 Q850 78 900 82" fill="none" stroke="#fecdd3" stroke-width="0.4" opacity="0.15"/>
  
  <!-- Scattered petals falling -->
  <ellipse cx="80" cy="30" rx="3" ry="2" fill="#ffb6c8" opacity="0.35" transform="rotate(-25 80 30)"/>
  <ellipse cx="180" cy="50" rx="2.5" ry="1.5" fill="#ffa0b4" opacity="0.3" transform="rotate(20 180 50)"/>
  <ellipse cx="320" cy="25" rx="2" ry="1.2" fill="#ffc0d0" opacity="0.25" transform="rotate(-40 320 25)"/>
  <ellipse cx="450" cy="45" rx="2.8" ry="1.7" fill="#ffb6c8" opacity="0.3" transform="rotate(10 450 45)"/>
  <ellipse cx="580" cy="35" rx="2" ry="1.2" fill="#ffa0b4" opacity="0.25" transform="rotate(-15 580 35)"/>
  <ellipse cx="700" cy="55" rx="2.5" ry="1.5" fill="#ffc0d0" opacity="0.3" transform="rotate(30 700 55)"/>
  <ellipse cx="820" cy="28" rx="2" ry="1.2" fill="#ffb6c8" opacity="0.25" transform="rotate(-20 820 28)"/>
  <ellipse cx="250" cy="65" rx="1.8" ry="1" fill="#ffa0b4" opacity="0.2" transform="rotate(15 250 65)"/>
  <ellipse cx="650" cy="20" rx="2.2" ry="1.3" fill="#ffc0d0" opacity="0.2" transform="rotate(-30 650 20)"/>
  
  <!-- Center text -->
  <text x="450" y="95" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#fecdd3" letter-spacing="3" opacity="0.35">
    花見  ·  HANAMI  ·  花見
  </text>
</svg>
