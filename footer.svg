<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="100%">
  <defs>
    <linearGradient id="footGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39d0d8" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="120" rx="12" fill="#0d1117"/>
  <!-- Top edge line -->
  <rect x="0" y="0" width="1200" height="2" rx="1" fill="#21262d"/>
  <rect x="400" y="0" width="400" height="2" rx="1" fill="#39d0d8" opacity="0.5"/>

  <!-- Terminal prompt -->
  <text x="60" y="50" font-family="monospace" font-size="16" fill="#7ee787">$ </text>
  <text x="84" y="50" font-family="monospace" font-size="16" fill="#c9d1d9">git log --oneline -1</text>

  <!-- Commit hash and message -->
  <text x="60" y="80" font-family="monospace" font-size="14" fill="#f78166">a1b2c3d</text>
  <text x="140" y="80" font-family="monospace" font-size="14" fill="#8b949e">(HEAD -> main, origin/main)</text>
  <text x="360" y="80" font-family="monospace" font-size="14" fill="#c9d1d9">The end justifies the means.</text>

  <!-- Status bar at bottom -->
  <rect x="0" y="96" width="1200" height="24" rx="12" fill="#161b22"/>
  <rect x="0" y="96" width="1200" height="12" fill="#161b22"/>
  <text x="20" y="112" font-family="monospace" font-size="10" fill="#8b949e">main</text>
  <text x="80" y="112" font-family="monospace" font-size="10" fill="#39d0d8">●</text>
  <text x="100" y="112" font-family="monospace" font-size="10" fill="#8b949e">UTF-8</text>
  <text x="1060" y="112" font-family="monospace" font-size="10" fill="#8b949e">GitHub</text>
  <text x="1120" y="112" font-family="monospace" font-size="10" fill="#8b949e">p5Patricio</text>

  <!-- Decorative dots -->
  <circle cx="1150" cy="30" r="3" fill="#21262d"/>
  <circle cx="1160" cy="30" r="3" fill="#21262d"/>
  <circle cx="1170" cy="30" r="3" fill="#21262d"/>
</svg>
