<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 140" width="900" height="140">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a" stop-opacity="0"/>
      <stop offset="40%" stop-color="#0f0f1a" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <style>
      @keyframes fall1{0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:.4}100%{transform:translateY(60px) translateX(20px) rotate(90deg);opacity:.1}}
      @keyframes fall2{0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:.35}100%{transform:translateY(55px) translateX(-15px) rotate(-80deg);opacity:.08}}
      @keyframes fall3{0%{transform:translateY(0) translateX(0) rotate(10deg);opacity:.3}100%{transform:translateY(65px) translateX(10px) rotate(120deg);opacity:.05}}
      @keyframes shimmer{0%,100%{opacity:.12}50%{opacity:.2}}
      .f1{animation:fall1 10s ease-in-out infinite}
      .f2{animation:fall2 12s ease-in-out infinite 2s}
      .f3{animation:fall3 14s ease-in-out infinite 4s}
      .f1d{animation:fall1 11s ease-in-out infinite 3s}
      .f2d{animation:fall2 13s ease-in-out infinite 5s}
      .f3d{animation:fall3 9s ease-in-out infinite 1s}
      .sh{animation:shimmer 6s ease-in-out infinite}
      @media(prefers-reduced-motion:reduce){*{animation-duration:.01s!important;animation-iteration-count:1!important}}
    </style>
  </defs>
  <rect width="900" height="140" fill="url(#fg)"/>
  <path d="M0 95Q100 90 200 97Q300 92 400 96Q500 90 600 95Q700 91 800 97Q850 93 900 96" fill="none" stroke="#fecdd3" stroke-width=".4" opacity=".15"/>
  <!-- Falling petals -->
  <ellipse cx="80" cy="15" rx="3" ry="1.8" fill="#ffb6c8" class="f1"/>
  <ellipse cx="180" cy="25" rx="2.5" ry="1.5" fill="#ffa0b4" class="f2"/>
  <ellipse cx="320" cy="10" rx="2" ry="1.2" fill="#ffc0d0" class="f3"/>
  <ellipse cx="450" cy="20" rx="2.8" ry="1.6" fill="#ffb6c8" class="f1d"/>
  <ellipse cx="580" cy="15" rx="2" ry="1.2" fill="#ffa0b4" class="f2d"/>
  <ellipse cx="700" cy="30" rx="2.5" ry="1.5" fill="#ffc0d0" class="f3d"/>
  <ellipse cx="820" cy="12" rx="2" ry="1.2" fill="#ffb6c8" class="f1"/>
  <ellipse cx="250" cy="35" rx="1.8" ry="1" fill="#ffa0b4" class="f3"/>
  <ellipse cx="650" cy="8" rx="2.2" ry="1.3" fill="#ffc0d0" class="f2d"/>
  <ellipse cx="400" cy="40" rx="2" ry="1.1" fill="#ffb6c8" class="f1d"/>
  <ellipse cx="530" cy="32" rx="1.8" ry="1" fill="#ffa0b4" class="f3d"/>
  <ellipse cx="150" cy="42" rx="2.2" ry="1.2" fill="#ffc0d0" class="f2"/>
  <!-- Water shimmer -->
  <line x1="100" y1="105" x2="800" y2="105" stroke="#fecdd3" stroke-width=".3" class="sh"/>
  <line x1="150" y1="112" x2="750" y2="112" stroke="#fecdd3" stroke-width=".2" opacity=".08"/>
  <!-- Text -->
  <text x="450" y="115" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#fecdd3" letter-spacing="3" opacity=".35">花見  ·  HANAMI  ·  花見</text>
  <text x="450" y="130" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="9" fill="#fecdd3" letter-spacing="2" opacity=".2">made with 桜 and code</text>
</svg>
