<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" width="100%" preserveAspectRatio="none">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39d0d8" stop-opacity="0"/>
      <stop offset="30%" stop-color="#39d0d8" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#58a6ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="segGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39d0d8"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="80" fill="#0d1117"/>

  <!-- Hex dump matrix background -->
  <text x="30" y="16" font-family="monospace" font-size="8" fill="#21262d" font-weight="400">
    0x7F3A 0x9C2E 0x4B1D 0xE8A0 0x12F7 0x56CD 0xA3B8 0xFF01
  </text>
  <text x="30" y="72" font-family="monospace" font-size="8" fill="#21262d" font-weight="400">
    0x1F4C 0x6D8B 0x3A7E 0x5C91 0xE204 0x88A3 0x71D5 0x0B6F
  </text>
  <text x="400" y="16" font-family="monospace" font-size="8" fill="#21262d" font-weight="400">
    0xCAFE 0xBEEF 0xDEAD 0xC0DE 0xF00D 0x1337 0xBABE 0xFACE
  </text>
  <text x="400" y="72" font-family="monospace" font-size="8" fill="#21262d" font-weight="400">
    0x8BAD 0xF00D 0xCAFE 0xBEEF 0xDEAD 0xC0DE 0xF00D 0x1337
  </text>
  <text x="770" y="16" font-family="monospace" font-size="8" fill="#21262d" font-weight="400">
    0xA1B2 0xC3D4 0xE5F6 0x0708 0x192A 0x3B4C 0x5D6E 0x7F80
  </text>
  <text x="770" y="72" font-family="monospace" font-size="8" fill="#21262d" font-weight="400">
    0x91A2 0xB3C4 0xD5E6 0xF708 0x091A 0x2B3C 0x4D5E 0x6F70
  </text>

  <!-- Binary strings interleaved -->
  <text x="100" y="28" font-family="monospace" font-size="7" fill="#21262d" opacity="0.6">01001101 01101001 01100100 01100101 01101110</text>
  <text x="700" y="58" font-family="monospace" font-size="7" fill="#21262d" opacity="0.6">01100001 01101101 01101111 00100000 01110000</text>

  <!-- Byte visualization bars (hex dump style) -->
  <g opacity="0.15">
    <rect x="50" y="32" width="3" height="16" rx="1" fill="#39d0d8"/>
    <rect x="56" y="36" width="3" height="12" rx="1" fill="#58a6ff"/>
    <rect x="62" y="30" width="3" height="18" rx="1" fill="#a371f7"/>
    <rect x="68" y="34" width="3" height="14" rx="1" fill="#39d0d8"/>
    <rect x="74" y="28" width="3" height="20" rx="1" fill="#58a6ff"/>
    <rect x="80" y="35" width="3" height="13" rx="1" fill="#a371f7"/>
    <rect x="86" y="31" width="3" height="17" rx="1" fill="#39d0d8"/>
    <rect x="92" y="33" width="3" height="15" rx="1" fill="#58a6ff"/>
  </g>
  <g opacity="0.15">
    <rect x="1080" y="32" width="3" height="16" rx="1" fill="#39d0d8"/>
    <rect x="1086" y="36" width="3" height="12" rx="1" fill="#58a6ff"/>
    <rect x="1092" y="30" width="3" height="18" rx="1" fill="#a371f7"/>
    <rect x="1098" y="34" width="3" height="14" rx="1" fill="#39d0d8"/>
    <rect x="1104" y="28" width="3" height="20" rx="1" fill="#58a6ff"/>
    <rect x="1110" y="35" width="3" height="13" rx="1" fill="#a371f7"/>
    <rect x="1116" y="31" width="3" height="17" rx="1" fill="#39d0d8"/>
    <rect x="1122" y="33" width="3" height="15" rx="1" fill="#58a6ff"/>
  </g>

  <!-- Main line segments with animated glow -->
  <rect x="80" y="38" width="1040" height="2" rx="1" fill="#21262d"/>

  <!-- Highlight segments with glow -->
  <rect x="180" y="37.5" width="100" height="3" rx="1.5" fill="url(#segGrad)" opacity="0.6" filter="url(#glow)">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.2s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="width" values="80;120;80" dur="2.2s" repeatCount="indefinite" begin="0s"/>
  </rect>
  <rect x="540" y="37.5" width="100" height="3" rx="1.5" fill="url(#segGrad)" opacity="0.6" filter="url(#glow)">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.2s" repeatCount="indefinite" begin="0.7s"/>
    <animate attributeName="width" values="80;120;80" dur="2.2s" repeatCount="indefinite" begin="0.7s"/>
  </rect>
  <rect x="900" y="37.5" width="100" height="3" rx="1.5" fill="url(#segGrad)" opacity="0.6" filter="url(#glow)">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.2s" repeatCount="indefinite" begin="1.4s"/>
    <animate attributeName="width" values="80;120;80" dur="2.2s" repeatCount="indefinite" begin="1.4s"/>
  </rect>

  <!-- Central hexagon -->
  <g transform="translate(600, 40)">
    <polygon points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7" fill="none" stroke="#39d0d8" stroke-width="1.5" opacity="0.25"/>
    <polygon points="0,-10 8.5,-5 8.5,5 0,10 -8.5,5 -8.5,-5" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="20s" repeatCount="indefinite"/>
    </polygon>
    <circle r="3" fill="#39d0d8" opacity="0.7" filter="url(#glow)">
      <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Section divider comment -->
  <text x="50%" y="54" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e" opacity="0.5">&lt;!-- section divider --&gt;</text>

  <!-- Floating hex values near highlights -->
  <text x="210" y="30" font-family="monospace" font-size="9" fill="#39d0d8" opacity="0.25">0x00</text>
  <text x="570" y="30" font-family="monospace" font-size="9" fill="#58a6ff" opacity="0.25">0x7F</text>
  <text x="930" y="30" font-family="monospace" font-size="9" fill="#a371f7" opacity="0.25">0xFF</text>

  <!-- Corner accents -->
  <path d="M 0 0 L 25 0 L 25 1.5 L 1.5 1.5 L 1.5 12 L 0 12 Z" fill="#39d0d8" opacity="0.07"/>
  <path d="M 1200 80 L 1175 80 L 1175 78.5 L 1198.5 78.5 L 1198.5 68 L 1200 68 Z" fill="#58a6ff" opacity="0.07"/>
</svg>