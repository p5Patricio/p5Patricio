  <text x="16" y="88" font-family="monospace" font-size="14" fill="#7d8590">2</text>
  <text x="16" y="112" font-family="monospace" font-size="14" fill="#7d8590">3</text>
  <text x="16" y="136" font-family="monospace" font-size="14" fill="#7d8590">4</text>
  <text x="16" y="160" font-family="monospace" font-size="14" fill="#7d8590">5</text>
  <text x="16" y="184" font-family="monospace" font-size="14" fill="#7d8590">6</text>
  <text x="16" y="208" font-family="monospace" font-size="14" fill="#7d8590">7</text>
  <text x="16" y="232" font-family="monospace" font-size="14" fill="#7d8590">8</text>
  <text x="16" y="256" font-family="monospace" font-size="14" fill="#7d8590">9</text>
