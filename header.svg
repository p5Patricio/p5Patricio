    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Decorative circuit lines on bottom edge -->
  <path d="M 0 340 L 120 340 L 140 360 L 200 360" fill="none" stroke="#21262d" stroke-width="2"/>
  <path d="M 1200 340 L 1080 340 L 1060 360 L 1000 360" fill="none" stroke="#21262d" stroke-width="2"/>
  <circle cx="140" cy="360" r="2.5" fill="#39d0d8" opacity="0.6">
