  <text x="12" y="304" font-family="monospace" font-size="14" fill="#7d8590">11</text>

  <!-- Code line 1: import -->
  <text x="72" y="68" font-family="monospace" font-size="15" fill="#ff7b72">import</text>
  <text x="142" y="68" font-family="monospace" font-size="15" fill="#c9d1d9"> { Engineer } </text>
  <text x="260" y="68" font-family="monospace" font-size="15" fill="#ff7b72">from</text>
  <text x="304" y="68" font-family="monospace" font-size="15" fill="#a5d6ff">"@universe/talent"</text>
  <text x="470" y="68" font-family="monospace" font-size="15" fill="#8b9490">// always learning</text>

  <!-- Code line 2: blank -->

