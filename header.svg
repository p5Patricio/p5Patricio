<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="100%">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <!-- Glow effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Connection gradient -->
    <linearGradient id="connGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39d0d8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Main background -->
  <rect width="1200" height="360" rx="12" fill="url(#bgGrad)"/>

  <!-- Blueprint dot grid background -->
  <g opacity="0.035">
    <pattern id="dotGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#39d0d8"/>
    </pattern>
    <rect width="1200" height="360" fill="url(#dotGrid)"/>
  </g>

  <!-- Floating code particles -->
  <text x="180" y="120" font-family="monospace" font-size="14" fill="#39d0d8" opacity="0.06">&lt;/&gt;</text>
  <text x="720" y="90" font-family="monospace" font-size="16" fill="#58a6ff" opacity="0.05">{ }</text>
  <text x="350" y="310" font-family="monospace" font-size="12" fill="#a371f7" opacity="0.06">#</text>
  <text x="950" y="280" font-family="monospace" font-size="13" fill="#39d0d8" opacity="0.05">$</text>
  <text x="520" y="130" font-family="monospace" font-size="11" fill="#8b949e" opacity="0.04">//</text>
  <text x="80" y="260" font-family="monospace" font-size="10" fill="#8b949e" opacity="0.04">/* */</text>
  <text x="1100" y="150" font-family="monospace" font-size="14" fill="#58a6ff" opacity="0.05">[ ]</text>
  <text x="280" y="80" font-family="monospace" font-size="12" fill="#a371f7" opacity="0.04">=&gt;</text>

  <!-- Decorative corner brackets -->
  <g stroke="#39d0d8" stroke-width="1.5" fill="none" opacity="0.12">
    <path d="M 20 20 L 50 20 L 50 25 L 25 25 L 25 50 L 20 50 Z"/>
    <path d="M 1180 20 L 1150 20 L 1150 25 L 1175 25 L 1175 50 L 1180 50 Z"/>
    <path d="M 20 340 L 50 340 L 50 335 L 25 335 L 25 310 L 20 310 Z"/>
    <path d="M 1180 340 L 1150 340 L 1150 335 L 1175 335 L 1175 310 L 1180 310 Z"/>
  </g>

  <!-- Status indicators -->
  <g>
    <circle cx="1120" cy="48" r="4" fill="#3fb950">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="1132" y="52" font-family="monospace" font-size="10" fill="#3fb950" opacity="0.8">ONLINE</text>
  </g>
  <g>
    <circle cx="1120" cy="68" r="4" fill="#d29922">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="1132" y="72" font-family="monospace" font-size="10" fill="#d29922" opacity="0.8">BUILDING</text>
  </g>

