  <text x="156" y="236" font-family="monospace" font-size="15" fill="#c9d1d9">: </text>
  <text x="170" y="236" font-family="monospace" font-size="15" fill="#a5d6ff">"Building sovereign AI"</text>

  <!-- Code line 9: closing brace -->
  <text x="72" y="260" font-family="monospace" font-size="15" fill="#c9d1d9">}</text>

  <!-- Code line 10: export -->
  <text x="72" y="284" font-family="monospace" font-size="15" fill="#ff7b72">export default</text>
  <text x="190" y="284" font-family="monospace" font-size="15" fill="#79c0ff">profile</text>

