  <text x="178" y="116" font-family="monospace" font-size="15" fill="#ff7b72">=</text>
  <text x="198" y="116" font-family="monospace" font-size="15" fill="#c9d1d9"> {</text>

  <!-- Code line 4: name -->
  <text x="108" y="140" font-family="monospace" font-size="15" fill="#79c0ff">name</text>
  <text x="148" y="140" font-family="monospace" font-size="15" fill="#c9d1d9">: </text>
  <text x="162" y="140" font-family="monospace" font-size="15" fill="#a5d6ff">"Patricio García Pérez Vela"</text>
  <text x="414" y="140" font-family="monospace" font-size="15" fill="#c9d1d9">,</text>

