  <rect x="800" y="56" width="360" height="240" rx="8" fill="#010409" stroke="#30363d" stroke-width="1"/>
  <rect x="800" y="56" width="360" height="28" rx="8" fill="#161b22"/>
  <rect x="800" y="76" width="360" height="8" fill="#161b22"/>
  <text x="820" y="74" font-family="monospace" font-size="10" fill="#8b949e">terminal — zsh</text>

  <!-- Terminal content -->
  <text x="820" y="112" font-family="monospace" font-size="13" fill="#7ee787">$ </text>
  <text x="838" y="112" font-family="monospace" font-size="13" fill="#c9d1d9">whoami</text>
  <text x="820" y="136" font-family="monospace" font-size="13" fill="#c9d1d9">p5patricio</text>

  <text x="820" y="168" font-family="monospace" font-size="13" fill="#7ee787">$ </text>
  <text x="838" y="168" font-family="monospace" font-size="13" fill="#c9d1d9">cat stack.txt</text>
  <text x="820" y="192" font-family="monospace" font-size="13" fill="#79c0ff">Python</text>
  <text x="870" y="192" font-family="monospace" font-size="13" fill="#c9d1d9"> · </text>
  <text x="890" y="192" font-family="monospace" font-size="13" fill="#79c0ff">TypeScript</text>
  <text x="820" y="212" font-family="monospace" font-size="13" fill="#79c0ff">Go</text>
  <text x="850" y="212" font-family="monospace" font-size="13" fill="#c9d1d9"> · </text>
  <text x="870" y="212" font-family="monospace" font-size="13" fill="#79c0ff">Node.js</text>
  <text x="820" y="232" font-family="monospace" font-size="13" fill="#79c0ff">FastAPI</text>
  <text x="870" y="232" font-family="monospace" font-size="13" fill="#c9d1d9"> · </text>
  <text x="890" y="232" font-family="monospace" font-size="13" fill="#79c0ff">Next.js</text>

  <text x="820" y="264" font-family="monospace" font-size="13" fill="#7ee787">$ </text>
  <text x="838" y="264" font-family="monospace" font-size="13" fill="#c9d1d9">echo </text>
  <text x="878" y="264" font-family="monospace" font-size="13" fill="#a5d6ff">"The end justifies the means."</text>

  <!-- Cursor blink -->
  <rect x="878" y="272" width="8" height="14" fill="#39d0d8">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Decorative circuit lines on bottom edge -->
  <path d="M 0 324 L 120 324 L 140 340 L 200 340" fill="none" stroke="#21262d" stroke-width="2"/>
  <path d="M 1200 324 L 1080 324 L 1060 340 L 1000 340" fill="none" stroke="#21262d" stroke-width="2"/>
  <circle cx="140" cy="340" r="2" fill="#39d0d8" opacity="0.6"/>
  <circle cx="1060" cy="340" r="2" fill="#39d0d8" opacity="0.6"/>
