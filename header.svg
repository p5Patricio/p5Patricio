<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="900" height="350">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="30%" stop-color="#151530"/>
      <stop offset="60%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <radialGradient id="moonRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="60%" stop-color="#ffe4e6"/>
      <stop offset="100%" stop-color="#fecdd3"/>
    </radialGradient>
    <radialGradient id="moonHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fecdd3" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#fecdd3" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#fecdd3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes twinkle1 { 0%,100%{opacity:.2} 50%{opacity:.8} }
      @keyframes twinkle2 { 0%,100%{opacity:.5} 50%{opacity:.15} }
      @keyframes twinkle3 { 0%,100%{opacity:.3} 30%{opacity:.9} 70%{opacity:.1} }
      @keyframes moonPulse { 0%,100%{opacity:.12;r:70} 50%{opacity:.2;r:78} }
      @keyframes moonGlow { 0%,100%{opacity:.8} 50%{opacity:.95} }
      @keyframes float1 { 0%{transform:translate(0,0) rotate(0deg)} 25%{transform:translate(15px,20px) rotate(45deg)} 50%{transform:translate(35px,45px) rotate(90deg)} 75%{transform:translate(55px,30px) rotate(135deg)} 100%{transform:translate(80px,60px) rotate(180deg)} }
      @keyframes float2 { 0%{transform:translate(0,0) rotate(0deg)} 25%{transform:translate(-10px,25px) rotate(-30deg)} 50%{transform:translate(10px,55px) rotate(20deg)} 75%{transform:translate(-5px,40px) rotate(-45deg)} 100%{transform:translate(20px,70px) rotate(60deg)} }
      @keyframes float3 { 0%{transform:translate(0,0) rotate(10deg)} 33%{transform:translate(25px,30px) rotate(-20deg)} 66%{transform:translate(10px,60px) rotate(40deg)} 100%{transform:translate(40px,80px) rotate(-10deg)} }
      @keyframes float4 { 0%{transform:translate(0,0) rotate(-15deg)} 50%{transform:translate(-20px,50px) rotate(25deg)} 100%{transform:translate(15px,90px) rotate(-30deg)} }
      @keyframes float5 { 0%{transform:translate(0,0) rotate(5deg)} 40%{transform:translate(30px,35px) rotate(-40deg)} 100%{transform:translate(-10px,75px) rotate(50deg)} }
      @keyframes swayL { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(1.5deg)} }
      @keyframes swayR { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-1.2deg)} }
      @keyframes shimmer1 { 0%,100%{opacity:.08} 50%{opacity:.18} }
      @keyframes shimmer2 { 0%,100%{opacity:.04} 50%{opacity:.12} }
      @keyframes fadeIn { 0%{opacity:0} 100%{opacity:.95} }
      @keyframes fadeInSub { 0%{opacity:0} 100%{opacity:.65} }
      @keyframes lantern { 0%,100%{opacity:.5} 50%{opacity:.85} }
      .s1{animation:twinkle1 3s ease-in-out infinite}
      .s2{animation:twinkle2 4s ease-in-out infinite}
      .s3{animation:twinkle3 5s ease-in-out infinite}
      .s1d{animation:twinkle1 3.5s ease-in-out infinite .5s}
      .s2d{animation:twinkle2 4.5s ease-in-out infinite 1s}
      .s3d{animation:twinkle3 3.8s ease-in-out infinite 1.5s}
      .mh{animation:moonPulse 6s ease-in-out infinite}
      .mb{animation:moonGlow 4s ease-in-out infinite}
      .p1{animation:float1 12s ease-in-out infinite}
      .p2{animation:float2 15s ease-in-out infinite}
      .p3{animation:float3 18s ease-in-out infinite}
      .p4{animation:float4 14s ease-in-out infinite}
      .p5{animation:float5 16s ease-in-out infinite}
      .p1d{animation:float1 13s ease-in-out infinite 2s}
      .p2d{animation:float2 16s ease-in-out infinite 3s}
      .p3d{animation:float3 14s ease-in-out infinite 1s}
      .p4d{animation:float4 17s ease-in-out infinite 4s}
      .p5d{animation:float5 11s ease-in-out infinite 2.5s}
      .lt{animation:swayL 8s ease-in-out infinite;transform-origin:80px 350px}
      .rt{animation:swayR 9s ease-in-out infinite;transform-origin:830px 350px}
      .w1{animation:shimmer1 5s ease-in-out infinite}
      .w2{animation:shimmer2 7s ease-in-out infinite 1s}
      .nt{animation:fadeIn 2s ease-out forwards;opacity:0}
      .st{animation:fadeInSub 2.5s ease-out .8s forwards;opacity:0}
      .la{animation:lantern 4s ease-in-out infinite}
      .lb{animation:lantern 5s ease-in-out infinite 1s}
      @media(prefers-reduced-motion:reduce){*{animation-duration:.01s!important;animation-iteration-count:1!important}}
    </style>
