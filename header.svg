<svg width="1200" height="120" viewBox="0 0 1200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .pixel { shape-rendering: crispEdges; }
    .neon-cyan { fill: #00FFCC; }
    .neon-magenta { fill: #FF00FF; }
    .bg-dark { fill: #0D0D0D; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .pulse-anim { animation: pulse 2s infinite; }
  </style>
  
  <rect width="1200" height="120" class="bg-dark pixel" />
  
  <!-- Cyberpunk Grid Lines -->
  <path d="M0 40H1200M0 80H1200M0 120H1200" stroke="#1A1A1A" stroke-width="1" class="pixel" />
  
  <!-- "P5" Pixel Logo -->
  <g transform="translate(40, 30) scale(4)" class="pulse-anim">
    <!-- P -->
    <rect x="0" y="0" width="4" height="12" class="pixel neon-cyan" />
    <rect x="4" y="0" width="4" height="4" class="pixel neon-cyan" />
    <rect x="4" y="4" width="4" height="4" class="pixel neon-cyan" />
    <!-- 5 -->
    <rect x="12" y="0" width="8" height="4" class="pixel neon-magenta" />
    <rect x="12" y="4" width="4" height="4" class="pixel neon-magenta" />
    <rect x="16" y="8" width="4" height="4" class="pixel neon-magenta" />
    <rect x="12" y="8" width="4" height="4" class="pixel neon-magenta" />
  </g>
  
  <!-- Stylized Text -->
  <text x="140" y="75" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#00FFCC" class="pixel">PATRICIO</text>
  <text x="142" y="77" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#FF00FF" opacity="0.5" class="pixel">PATRICIO</text>
  
  <!-- Decorative Pixels -->
  <rect x="1100" y="20" width="10" height="10" class="pixel neon-cyan" />
  <rect x="1120" y="40" width="10" height="10" class="pixel neon-magenta" />
  <rect x="1140" y="60" width="10" height="10" class="pixel neon-cyan" />
  
  <!-- Status bar -->
  <rect x="0" y="100" width="1200" height="20" fill="#111" class="pixel" />
  <text x="20" y="114" font-family="monospace" font-size="12" fill="#00FFCC" opacity="0.8">SYSTEM OVERRIDE: ACTIVE // [BOOT_SEQ: 8-BIT_VIBE]</text>
</svg>