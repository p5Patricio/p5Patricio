  <text x="156" y="188" font-family="monospace" font-size="15" fill="#c9d1d9">: [</text>
  <text x="176" y="188" font-family="monospace" font-size="15" fill="#a5d6ff">"AI Systems"</text>
  <text x="282" y="188" font-family="monospace" font-size="15" fill="#c9d1d9">, </text>
  <text x="298" y="188" font-family="monospace" font-size="15" fill="#a5d6ff">"Full-Stack"</text>
  <text x="402" y="188" font-family="monospace" font-size="15" fill="#c9d1d9">, </text>
  <text x="418" y="188" font-family="monospace" font-size="15" fill="#a5d6ff">"NLP"</text>
  <text x="470" y="188" font-family="monospace" font-size="15" fill="#c9d1d9">],</text>

  <!-- Code line 7: location -->
  <text x="108" y="212" font-family="monospace" font-size="15" fill="#79c0ff">location</text>
  <text x="180" y="212" font-family="monospace" font-size="15" fill="#c9d1d9">: </text>
  <text x="194" y="212" font-family="monospace" font-size="15" fill="#a5d6ff">"Guanajuato, México"</text>
  <text x="374" y="212" font-family="monospace" font-size="15" fill="#c9d1d9">,</text>

  <!-- Code line 8: status -->
  <text x="108" y="236" font-family="monospace" font-size="15" fill="#79c0ff">status</text>
  <text x="160" y="236" font-family="monospace" font-size="15" fill="#c9d1d9">: </text>
  <text x="174" y="236" font-family="monospace" font-size="15" fill="#a5d6ff">"Building sovereign AI"</text>

  <!-- Code line 9: closing brace -->
  <text x="76" y="260" font-family="monospace" font-size="15" fill="#c9d1d9">}</text>

  <!-- Code line 10: export -->
  <text x="76" y="284" font-family="monospace" font-size="15" fill="#ff7b72">export default</text>
  <text x="194" y="284" font-family="monospace" font-size="15" fill="#79c0ff">profile</text>

  <!-- Code line 11: comment -->
  <text x="76" y="308" font-family="monospace" font-size="14" fill="#8b9490">// Hay que dar un paso a la vez. Solo uno a la vez.</text>

  <!-- Code line 12: blank -->

  <!-- Connection lines from code to terminal -->
  <g fill="none" stroke="url(#connGrad)" stroke-width="1" opacity="0.25" stroke-dasharray="4 4">
    <path d="M 520 180 L 700 180 L 720 160 L 780 160"/>
    <path d="M 480 220 L 680 220 L 700 200 L 780 200"/>
  </g>

