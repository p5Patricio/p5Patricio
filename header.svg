  <text x="152" y="188" font-family="monospace" font-size="15" fill="#c9d1d9">: [</text>
  <text x="172" y="188" font-family="monospace" font-size="15" fill="#a5d6ff">"AI Systems"</text>
  <text x="278" y="188" font-family="monospace" font-size="15" fill="#c9d1d9">, </text>
  <text x="294" y="188" font-family="monospace" font-size="15" fill="#a5d6ff">"Full-Stack"</text>
  <text x="398" y="188" font-family="monospace" font-size="15" fill="#c9d1d9">, </text>
  <text x="414" y="188" font-family="monospace" font-size="15" fill="#a5d6ff">"NLP"</text>
  <text x="466" y="188" font-family="monospace" font-size="15" fill="#c9d1d9">],</text>

  <!-- Code line 7: location -->
  <text x="104" y="212" font-family="monospace" font-size="15" fill="#79c0ff">location</text>
  <text x="176" y="212" font-family="monospace" font-size="15" fill="#c9d1d9">: </text>
  <text x="190" y="212" font-family="monospace" font-size="15" fill="#a5d6ff">"Guanajuato, México"</text>
  <text x="370" y="212" font-family="monospace" font-size="15" fill="#c9d1d9">,</text>

