  <text x="916" y="226" font-family="monospace" font-size="12" fill="#c9d1d9"> · </text>
  <text x="936" y="226" font-family="monospace" font-size="12" fill="#79c0ff">Ollama</text>

  <text x="856" y="252" font-family="monospace" font-size="12" fill="#7ee787">$ </text>
  <text x="874" y="252" font-family="monospace" font-size="12" fill="#c9d1d9">uptime</text>
  <text x="856" y="272" font-family="monospace" font-size="12" fill="#c9d1d9">always building...</text>

