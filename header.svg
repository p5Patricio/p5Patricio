  <text x="798" y="118" font-family="monospace" font-size="8" fill="#8b949e" opacity="0.5">  📄 main</text>
  <text x="798" y="132" font-family="monospace" font-size="8" fill="#8b949e" opacity="0.5">  📄 lib</text>
  <text x="790" y="150" font-family="monospace" font-size="8" fill="#8b949e" opacity="0.6">📁 assets</text>
  <text x="790" y="168" font-family="monospace" font-size="8" fill="#8b949e" opacity="0.6">📁 config</text>

  <!-- Terminal content -->
  <text x="856" y="112" font-family="monospace" font-size="12" fill="#7ee787">$ </text>
  <text x="874" y="112" font-family="monospace" font-size="12" fill="#c9d1d9">whoami</text>
  <text x="856" y="132" font-family="monospace" font-size="12" fill="#c9d1d9">p5patricio</text>

  <text x="856" y="158" font-family="monospace" font-size="12" fill="#7ee787">$ </text>
  <text x="874" y="158" font-family="monospace" font-size="12" fill="#c9d1d9">cat stack.txt</text>
  <text x="856" y="178" font-family="monospace" font-size="12" fill="#79c0ff">Python</text>
