    <text x="18" y="88">2</text>
    <text x="18" y="112">3</text>
    <text x="18" y="136">4</text>
    <text x="18" y="160">5</text>
    <text x="18" y="184">6</text>
    <text x="18" y="208">7</text>
    <text x="18" y="232">8</text>
    <text x="18" y="256">9</text>
    <text x="14" y="280">10</text>
    <text x="14" y="304">11</text>
    <text x="14" y="328">12</text>
  </g>

  <!-- File tree sidebar icons -->
  <g font-family="monospace" font-size="9" fill="#8b949e" opacity="0.5">
    <text x="8" y="64">│</text>
    <text x="8" y="88">│</text>
    <text x="8" y="112">│</text>
    <text x="8" y="136">│</text>
    <text x="8" y="160">│</text>
    <text x="8" y="184">│</text>
    <text x="8" y="208">│</text>
    <text x="8" y="232">│</text>
    <text x="8" y="256">│</text>
    <text x="8" y="280">│</text>
    <text x="8" y="304">│</text>
    <text x="8" y="328">│</text>
  </g>

  <!-- Code line 1: import -->
  <text x="76" y="68" font-family="monospace" font-size="15" fill="#ff7b72">import</text>
  <text x="146" y="68" font-family="monospace" font-size="15" fill="#c9d1d9"> { Engineer } </text>
  <text x="264" y="68" font-family="monospace" font-size="15" fill="#ff7b72">from</text>
  <text x="308" y="68" font-family="monospace" font-size="15" fill="#a5d6ff">"@universe/talent"</text>
  <text x="474" y="68" font-family="monospace" font-size="15" fill="#8b9490">// always learning</text>

  <!-- Code line 2: blank -->

