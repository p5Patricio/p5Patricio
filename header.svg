<svg width="1200" height="150" viewBox="0 0 1200 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .brand-text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 800; font-size: 48px; fill: #FFFFFF; letter-spacing: -1px; }
    .capsule { shape-rendering: geometricPrecision; }
    @keyframes slide { 0% { transform: translateX(-10px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
    .animate-in { animation: slide 0.8s ease-out forwards; }
  </style>

  <rect width="1200" height="150" fill="#000000" />

  <!-- Digital Duck Logo (Simplified Capsule Representation) -->
  <g transform="translate(60, 35) scale(0.6)">
    <!-- Head -->
    <rect x="100" y="0" width="80" height="20" rx="10" fill="#00CCFF" />
    <rect x="120" y="25" width="100" height="20" rx="10" fill="#00CCFF" />
    <rect x="180" y="12" width="60" height="20" rx="10" fill="#FFDD00" /> <!-- Beak -->
    
    <!-- Body Layers -->
    <rect x="0" y="60" width="140" height="25" rx="12.5" fill="#0077FF" />
    <rect x="20" y="90" width="180" height="25" rx="12.5" fill="#00CCFF" />
    <rect x="40" y="120" width="120" height="25" rx="12.5" fill="#FF4433" />
    
    <!-- Tail -->
    <path d="M0 60C0 30 40 30 40 60" stroke="#00CCFF" stroke-width="20" stroke-linecap="round" fill="none" />
  </g>

  <!-- Name and Identity -->
  <text x="250" y="85" class="brand-text animate-in">PATRICIO GARCÍA</text>
  
  <!-- Modern Accent Capsule -->
  <rect x="250" y="105" width="200" height="6" rx="3" fill="#00CCFF" class="animate-in" style="animation-delay: 0.2s;" />
  <rect x="460" y="105" width="40" height="6" rx="3" fill="#FFDD00" class="animate-in" style="animation-delay: 0.4s;" />
  <rect x="510" y="105" width="20" height="6" rx="3" fill="#FF4433" class="animate-in" style="animation-delay: 0.6s;" />

  <!-- Status indicator -->
  <g transform="translate(1100, 75)">
    <circle cx="0" cy="0" r="4" fill="#39FF14">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="12" y="5" font-family="monospace" font-size="12" fill="#888">SYSTEM_ONLINE</text>
  </g>
</svg>