<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="100%">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <!-- Glow effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main background -->
  <rect width="1200" height="340" rx="12" fill="url(#bgGrad)"/>

  <!-- Window title bar -->
  <rect width="1200" height="36" rx="12" fill="#010409"/>
  <rect x="0" y="24" width="1200" height="12" fill="#010409"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="18" r="6" fill="#27c93f"/>

  <!-- Tabs -->
  <rect x="100" y="8" width="140" height="28" rx="6" fill="#161b22"/>
