  <rect x="780" y="56" width="380" height="28" rx="8" fill="#161b22"/>
  <rect x="780" y="76" width="380" height="8" fill="#161b22"/>
  <text x="800" y="74" font-family="monospace" font-size="10" fill="#8b949e">terminal — zsh</text>

