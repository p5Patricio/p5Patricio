  <text x="926" y="178" font-family="monospace" font-size="12" fill="#79c0ff">TypeScript</text>
  <text x="856" y="194" font-family="monospace" font-size="12" fill="#79c0ff">Go</text>
  <text x="886" y="194" font-family="monospace" font-size="12" fill="#c9d1d9"> · </text>
  <text x="906" y="194" font-family="monospace" font-size="12" fill="#79c0ff">Node.js</text>
  <text x="856" y="210" font-family="monospace" font-size="12" fill="#79c0ff">FastAPI</text>
  <text x="906" y="210" font-family="monospace" font-size="12" fill="#c9d1d9"> · </text>
  <text x="926" y="210" font-family="monospace" font-size="12" fill="#79c0ff">Next.js</text>
