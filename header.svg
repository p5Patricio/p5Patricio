  <text x="115" y="26" font-family="monospace" font-size="11" fill="#8b949e">README.md</text>
  <rect x="248" y="8" width="120" height="28" rx="6" fill="#0d1117"/>
  <text x="263" y="26" font-family="monospace" font-size="11" fill="#c9d1d9">profile.ts</text>
  <rect x="376" y="8" width="120" height="28" rx="6" fill="#0d1117"/>
  <text x="391" y="26" font-family="monospace" font-size="11" fill="#c9d1d9">about.py</text>

